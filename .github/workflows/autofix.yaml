---
name: 🪄 Autofix
"on":
  workflow_dispatch:
  schedule:
    - cron: "27 4 * * 1"
  push:
    branches:
      - main

jobs:

  autofix:
    uses: kdeldycke/repomatic/.github/workflows/autofix.yaml@7336863d9f3f5faea26f887211f3f745dc963fb5 # v7.2.0
    secrets:
      REPOMATIC_NOTIFICATIONS_PAT: ${{ secrets.REPOMATIC_NOTIFICATIONS_PAT }}
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
