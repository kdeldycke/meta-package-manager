---
name: 🆙 Changelog & versions
"on":
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
    paths:
      - changelog.md
      - "**/pyproject.toml"
      - ".github/workflows/*.yaml"
      - uv.lock
      - "**/*.py"
      - "docs/**"
  workflow_run:
    workflows:
      - "Build & release"
    types:
      - completed
    branches:
      - main

jobs:

  changelog:
    uses: kdeldycke/repomatic/.github/workflows/changelog.yaml@8d3bdd26cb0a91c422f1b7210cb978ba75865822 # v7.1.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
