---
name: 🧪 Validate Guix packages
"on":
  workflow_dispatch:

# Temporary workflow to validate the Guix package definitions submitted at
# https://codeberg.org/guix/guix/pulls/8047
# Delete after the PR is merged upstream.

permissions: {}

jobs:

  validate:
    name: Build and lint Guix packages
    runs-on: ubuntu-24.04
    env:
      GUIX_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install Guix
        # Ubuntu ships guix 1.4.0 (Guile 3.0.8), which cannot compile the
        # current Guix channel: core modules call `spawn`, added in Guile 3.0.9.
        # Install the latest nightly guix binary from the build farm instead of
        # apt.  Mirrors the approach of PromyLOPh/guix-install-action.
        run: |
          set -euo pipefail
          guix_url="https://ci.guix.gnu.org/search/latest/archive"
          guix_query="query=spec:tarball+status:success+system:x86_64-linux+guix-binary.tar.xz"
          wget -nv "${guix_url}?${guix_query}" -O /tmp/guix-binary.tar.xz
          sudo tar --extract --file=/tmp/guix-binary.tar.xz -C / --no-overwrite-dir
          sudo groupadd --system guixbuild
          for i in $(seq -w 1 10); do
            sudo useradd -g guixbuild -G guixbuild -d /var/empty -s "$(which nologin)" \
              -c "Guix build user ${i}" --system "guixbuilder${i}"
          done
          guix_root=/var/guix/profiles/per-user/root/current-guix
          sudo cp "${guix_root}/lib/systemd/system/gnu-store.mount" /etc/systemd/system/
          # The bundled guix-daemon.service logs to syslog, which ubuntu-24.04
          # runners lack (they use journald), so it fails to start.  Install a
          # known-good unit logging to the journal instead.
          sudo tee /etc/systemd/system/guix-daemon.service >/dev/null <<'UNIT'
          [Unit]
          Description=Build daemon for GNU Guix
          After=gnu-store.mount
          [Service]
          ExecStart=/var/guix/profiles/per-user/root/current-guix/bin/guix-daemon --build-users-group=guixbuild
          Environment=GUIX_LOCPATH=/var/guix/profiles/per-user/root/guix-profile/lib/locale LC_ALL=en_US.utf8
          StandardOutput=journal
          StandardError=journal
          OOMPolicy=continue
          Restart=always
          TasksMax=8192
          [Install]
          WantedBy=multi-user.target
          UNIT
          sudo systemctl daemon-reload
          sudo systemctl enable --now gnu-store.mount guix-daemon.service || true
          sleep 3
          if ! sudo systemctl is-active --quiet guix-daemon.service; then
            echo "=== guix-daemon failed to start ==="
            sudo systemctl status guix-daemon.service --no-pager || true
            sudo journalctl -xeu guix-daemon.service --no-pager | tail -60 || true
            exit 1
          fi
          echo "guix-daemon active"
          echo "${guix_root}/bin" >> "${GITHUB_PATH}"
          # Authorize the build farm so substitutes are usable.
          for pub in "${guix_root}"/share/guix/*.pub; do
            # The *.pub keys are world-readable, so reading them via the input
            # redirect works as the unprivileged user; only the ACL write that
            # `guix archive --authorize` performs needs root, hence sudo.
            # shellcheck disable=SC2024
            sudo "${guix_root}/bin/guix" archive --authorize < "${pub}"
          done

      - name: Pull Guix from fork channel
        run: |
          cat > /tmp/channels.scm << 'CHANNELS'
          (list
            (channel
              (name 'guix)
              (url "https://codeberg.org/kdeldycke/guix.git")
              (branch "mpm-and-dependencies")))
          CHANNELS
          # guix pull intermittently fails on transient git/SSL errors; retry a
          # few times to absorb those blips.  Deliberately no --fallback: a
          # sustained Guix substitute outage should fail fast here rather than
          # silently switch to building guile/guix from source for hours and
          # exhausting the 6h GHA job limit.  Rerun later when substitutes
          # recover.
          for attempt in 1 2 3; do
            echo "guix pull attempt ${attempt}..."
            if guix pull --channels=/tmp/channels.scm --disable-authentication > /tmp/guix-pull.log 2>&1; then
              tail -n 30 /tmp/guix-pull.log
              echo "$HOME/.config/guix/current/bin" >> "$GITHUB_PATH"
              exit 0
            fi
            tail -n 80 /tmp/guix-pull.log
            [ "${attempt}" -eq 3 ] && break
            echo "retrying in 30s..."
            sleep 30
          done
          # "build of compute-guix-derivation.drv failed" is really a failed
          # dependency: module-import-compiled.drv (the Guile compilation of the
          # channel's modules).  guix prints "View build log at
          # '/var/log/guix/drvs/...gz'" for each failure; dump those logs (they
          # hold the real Unbound-variable / syntax error).  Logs are root-owned
          # and gzipped, so read them with sudo + zcat.
          echo "=== guix pull failed; dumping failing build log(s) ==="
          paths=$(grep -oE "/var/log/guix/drvs/[A-Za-z0-9/_.+-]+\.(gz|bz2)" /tmp/guix-pull.log | sort -u)
          if [ -z "${paths}" ]; then
            paths=$(sudo find /var/log/guix/drvs -name '*.gz' -newermt '-10 min' 2>/dev/null)
          fi
          echo "log files: ${paths:-<none>}"
          for logf in ${paths}; do
            echo "=================== ${logf} ==================="
            {
              sudo zcat "${logf}" 2>/dev/null \
                || sudo bzcat "${logf}" 2>/dev/null \
                || zcat "${logf}" 2>/dev/null
            } | tail -250
          done
          exit 1

      - name: Lint all new packages
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-extra-platforms
            python-packageurl-python
            python-wcmatch
            meta-package-manager
          )

          {
            echo "## guix lint"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Linting ${pkg} ---"
            # Drop the cve and archival checkers: they query external services
            # (the NVD CVE feed and Software Heritage) and intermittently crash
            # on transient TLS errors, leaving a Guile backtrace none of the
            # grep filters below can match.  This gate validates packaging, not
            # security advisories, so excluding them is safe and deterministic.
            lint_output=$(guix lint --exclude=cve,archival "${pkg}" 2>&1 \
              | grep -v -E "^guix lint: warning: GitHub rate limit exceeded" \
              | grep -v -E "^hint: You can raise the rate limit" \
              | grep -v -E "^variable to a token obtained from" \
              | grep -v -E "^your GitHub account\." \
              | grep -v -E "^Alternatively, you can wait until" \
              | grep -v -E "^\`generic-git' updater instead\." \
              | grep -v -E ": can be upgraded to .*[-.]?(rc|alpha|beta|dev|a|b)[0-9]*\.?[0-9]*$" \
              | sed '/^$/d') || true
            if [ -n "${lint_output}" ]; then
              echo "${lint_output}"
              {
                echo "- ⚠️ \`${pkg}\`"
                echo '```'
                echo "${lint_output}"
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            else
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            fi
            echo "" >> "${GITHUB_STEP_SUMMARY}"
          done

          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

          if [ "${failed}" -gt 0 ]; then
            exit 1
          fi

      - name: Build all new packages
        if: always()
        run: |
          set -o pipefail

          packages=(
            python-bracex
            python-click-extra
            python-extra-platforms
            python-packageurl-python
            python-wcmatch
            meta-package-manager
          )

          {
            echo ""
            echo "## guix build"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Building ${pkg} ---"
            log=$(mktemp)
            if guix build "${pkg}" >"${log}" 2>&1; then
              tail --lines=20 "${log}"
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            else
              # Show every FAILED line plus the surrounding 200 lines for
              # diagnosis instead of just the tail.
              grep -E "^FAILED|^ERROR|short test summary|^=+ .* in [0-9]" "${log}" || true
              echo "--- last 200 lines ---"
              tail --lines=200 "${log}"
              echo "- ❌ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            fi
            rm -f "${log}"
          done

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

          if [ "${failed}" -gt 0 ]; then
            exit 1
          fi

      - name: Report closure sizes
        if: always()
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-extra-platforms
            python-packageurl-python
            python-wcmatch
            meta-package-manager
          )

          {
            echo ""
            echo "## guix size"
            echo ""
            echo '| Package | Closure size |'
            echo '|---|---|'
          } >> "${GITHUB_STEP_SUMMARY}"

          for pkg in "${packages[@]}"; do
            size=$(guix size "${pkg}" 2>/dev/null | tail --lines=1 || echo "n/a")
            echo "| \`${pkg}\` | ${size} |" >> "${GITHUB_STEP_SUMMARY}"
          done
