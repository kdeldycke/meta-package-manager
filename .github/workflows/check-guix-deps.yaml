---
name: 🧪 Validate Guix packages
"on":
  workflow_dispatch:

# Temporary workflow to validate the Guix package definitions submitted at
# https://codeberg.org/guix/guix/pulls/8047
# Delete after the PR is merged upstream.

permissions: {}

jobs:

  validate:
    name: Build and lint Guix packages
    runs-on: ubuntu-24.04
    steps:
      - name: Install Guix
        run: |
          sudo apt-get update
          sudo apt-get install --yes --quiet guix
          sudo guix pull --verbosity=0
      - name: Clone Guix with mpm branch
        run: >
          git clone --depth=50 --branch=mpm-and-dependencies
          https://codeberg.org/tutu967/guix.git /tmp/guix-repo
      - name: Lint all new packages
        env:
          GUIX_PACKAGE_PATH: /tmp/guix-repo/gnu/packages
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          echo "## guix lint" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Linting ${pkg} ---"
            if guix lint "${pkg}" > /tmp/lint-output 2>&1; then
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "- ❌ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            fi
            # Only include lint output in summary when non-empty.
            if [ -s /tmp/lint-output ]; then
              echo '```' >> "${GITHUB_STEP_SUMMARY}"
              cat /tmp/lint-output >> "${GITHUB_STEP_SUMMARY}"
              echo '```' >> "${GITHUB_STEP_SUMMARY}"
            fi
            echo "" >> "${GITHUB_STEP_SUMMARY}"
          done

          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

      - name: Build all new packages
        env:
          GUIX_PACKAGE_PATH: /tmp/guix-repo/gnu/packages
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "## guix build" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Building ${pkg} ---"
            if guix build --verbosity=0 "${pkg}" 2>&1 | tail --lines=5; then
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "- ❌ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            fi
          done

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

      - name: Report closure sizes
        env:
          GUIX_PACKAGE_PATH: /tmp/guix-repo/gnu/packages
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "## guix size" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo '| Package | Closure size |' >> "${GITHUB_STEP_SUMMARY}"
          echo '|---|---|' >> "${GITHUB_STEP_SUMMARY}"

          for pkg in "${packages[@]}"; do
            size=$(guix size "${pkg}" 2>/dev/null | tail --lines=1 || echo "n/a")
            echo "| \`${pkg}\` | ${size} |" >> "${GITHUB_STEP_SUMMARY}"
          done
