---
name: 🧪 Validate Guix packages
"on":
  workflow_dispatch:

# Temporary workflow to validate the Guix package definitions submitted at
# https://codeberg.org/guix/guix/pulls/8047
# Delete after the PR is merged upstream.

permissions: {}

jobs:

  validate:
    name: Build and lint Guix packages
    runs-on: ubuntu-24.04
    env:
      GUIX_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install Guix
        run: |
          sudo apt-get update
          sudo apt-get install --yes --quiet guix

      - name: Pull Guix from fork channel
        run: |
          cat > /tmp/channels.scm << 'CHANNELS'
          (list
            (channel
              (name 'guix)
              (url "https://codeberg.org/tutu967/guix.git")
              (branch "mpm-and-dependencies")))
          CHANNELS
          guix pull --channels=/tmp/channels.scm --disable-authentication --verbosity=0
          echo "$HOME/.config/guix/current/bin" >> "$GITHUB_PATH"

      - name: Lint all new packages
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          {
            echo "## guix lint"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Linting ${pkg} ---"
            lint_output=$(guix lint "${pkg}" 2>&1 \
              | grep -v -E "^fetching CVE database|Software Heritage" \
              | grep -v -E "^guix lint: warning: failed to get list of CVE vulnerabilities" \
              | grep -v -E "^guix lint: warning: GitHub rate limit exceeded" \
              | grep -v -E "^hint: You can raise the rate limit" \
              | grep -v -E "^variable to a token obtained from" \
              | grep -v -E "^your GitHub account\." \
              | grep -v -E "^Alternatively, you can wait until" \
              | grep -v -E "^\`generic-git' updater instead\." \
              | sed '/^$/d') || true
            if [ -n "${lint_output}" ]; then
              echo "${lint_output}"
              {
                echo "- ⚠️ \`${pkg}\`"
                echo '```'
                echo "${lint_output}"
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            else
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            fi
            echo "" >> "${GITHUB_STEP_SUMMARY}"
          done

          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

          if [ "${failed}" -gt 0 ]; then
            exit 1
          fi

      - name: Build all new packages
        if: always()
        run: |
          set -o pipefail

          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          {
            echo ""
            echo "## guix build"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Building ${pkg} ---"
            log=$(mktemp)
            if guix build "${pkg}" >"${log}" 2>&1; then
              tail --lines=20 "${log}"
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            else
              # Show every FAILED line plus the surrounding 200 lines for
              # diagnosis instead of just the tail.
              grep -E "^FAILED|^ERROR|short test summary|^=+ .* in [0-9]" "${log}" || true
              echo "--- last 200 lines ---"
              tail --lines=200 "${log}"
              echo "- ❌ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            fi
            rm -f "${log}"
          done

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

          if [ "${failed}" -gt 0 ]; then
            exit 1
          fi

      - name: Report closure sizes
        if: always()
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          {
            echo ""
            echo "## guix size"
            echo ""
            echo '| Package | Closure size |'
            echo '|---|---|'
          } >> "${GITHUB_STEP_SUMMARY}"

          for pkg in "${packages[@]}"; do
            size=$(guix size "${pkg}" 2>/dev/null | tail --lines=1 || echo "n/a")
            echo "| \`${pkg}\` | ${size} |" >> "${GITHUB_STEP_SUMMARY}"
          done
