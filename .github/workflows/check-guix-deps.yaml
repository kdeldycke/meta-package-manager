---
name: 🧪 Validate Guix packages
"on":
  workflow_dispatch:

# Temporary workflow to validate the Guix package definitions submitted at
# https://codeberg.org/guix/guix/pulls/8047
# Delete after the PR is merged upstream.

permissions: {}

jobs:

  validate:
    name: Build and lint Guix packages
    runs-on: ubuntu-24.04
    steps:
      - name: Install Guix
        run: |
          sudo apt-get update
          sudo apt-get install --yes --quiet guix

      - name: Pull Guix from fork channel
        run: |
          cat > /tmp/channels.scm << 'CHANNELS'
          (list
            (channel
              (name 'guix)
              (url "https://codeberg.org/tutu967/guix.git")
              (branch "mpm-and-dependencies")))
          CHANNELS
          guix pull --channels=/tmp/channels.scm --disable-authentication --verbosity=0
          echo "$HOME/.config/guix/current/bin" >> "$GITHUB_PATH"

      - name: Lint all new packages
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          echo "## guix lint" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Linting ${pkg} ---"
            lint_output=$(guix lint "${pkg}" 2>&1 \
              | grep -v -E "^fetching CVE database|Software Heritage") || true
            if [ -n "${lint_output}" ]; then
              echo "${lint_output}"
              echo "- ⚠️ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
              echo '```' >> "${GITHUB_STEP_SUMMARY}"
              echo "${lint_output}" >> "${GITHUB_STEP_SUMMARY}"
              echo '```' >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            else
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            fi
            echo "" >> "${GITHUB_STEP_SUMMARY}"
          done

          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

          if [ "${failed}" -gt 0 ]; then
            exit 1
          fi

      - name: Build all new packages
        run: |
          set -o pipefail

          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "## guix build" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in "${packages[@]}"; do
            echo "--- Building ${pkg} ---"
            if guix build "${pkg}" 2>&1 | tail --lines=20; then
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "- ❌ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            fi
          done

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**${failed} failed** out of ${#packages[@]} packages." >> "${GITHUB_STEP_SUMMARY}"

          if [ "${failed}" -gt 0 ]; then
            exit 1
          fi

      - name: Report closure sizes
        run: |
          packages=(
            python-bracex
            python-click-extra
            python-cyclonedx-python-lib
            python-extra-platforms
            python-packageurl-python
            python-py-serializable
            python-spdx-tools
            python-wcmatch
            meta-package-manager
          )

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "## guix size" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo '| Package | Closure size |' >> "${GITHUB_STEP_SUMMARY}"
          echo '|---|---|' >> "${GITHUB_STEP_SUMMARY}"

          for pkg in "${packages[@]}"; do
            size=$(guix size "${pkg}" 2>/dev/null | tail --lines=1 || echo "n/a")
            echo "| \`${pkg}\` | ${size} |" >> "${GITHUB_STEP_SUMMARY}"
          done
