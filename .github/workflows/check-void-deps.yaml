---
name: 🧪 Validate Void Linux packages
"on":
  workflow_dispatch:

# Temporary workflow that builds the Void Linux templates for mpm and its
# transitive dependencies from the `mpm` branch of kdeldycke/void-packages
# using xbps-src inside the official Void glibc container. Each package is
# built in dependency order; results are summarised per-package in the step
# summary so failures surface independently.
#
# Delete after the upstream PR to void-linux/void-packages is merged.

permissions: {}

env:
  VOID_FORK: kdeldycke/void-packages
  VOID_BRANCH: mpm
  # Build sequence, leaves first. Must match the commit order on the branch.
  PACKAGES: >-
    python3-beartype
    python3-cloup
    python3-deepmerge
    python3-fqdn
    python3-packageurl-python
    python3-py-serializable
    python3-rfc3987-syntax
    python3-semantic_version
    python3-uri-template
    python3-webcolors
    python3-isoduration
    python3-extra-platforms
    python3-spdx-tools
    python3-click-extra
    python3-cyclonedx-python-lib
    mpm

jobs:

  xbps-build:
    name: xbps-src build cascade
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    steps:
      - name: Sync xbps and install build tooling
        timeout-minutes: 10
        run: |
          set -eux
          # The default repo-default.voidlinux.org mirror throttles GitHub
          # Actions runners. Switch to a Fastly CDN-backed mirror first.
          mkdir --parents /etc/xbps.d
          echo 'repository=https://repo-fastly.voidlinux.org/current' \
            > /etc/xbps.d/00-repository-main.conf
          xbps-install --sync --yes xbps
          # xbps-src lives inside the void-packages tree itself; we only
          # need git (to clone the branch), sudo (to drop root for
          # xbps-src, which refuses to run as root), and xtools.
          xbps-install --yes \
            base-devel \
            git \
            sudo \
            xtools

      - name: Provision builder user
        run: |
          set -eux
          # Mirror void-packages' own CI: a non-root `builder` user that
          # owns the void-packages tree and runs all xbps-src invocations.
          # The xbuilder group is what xbps-src's chroot helpers consult.
          groupadd --system xbuilder
          useradd --no-create-home --groups xbuilder builder
          # Allow the runner step's `sudo -Eu builder ...` without prompts.
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - name: Clone fork branch
        timeout-minutes: 5
        run: |
          set -eux
          git clone \
            --branch "${VOID_BRANCH}" \
            --depth 1 \
            "https://github.com/${VOID_FORK}" \
            /void-packages
          chown --recursive builder:builder /void-packages
          (cd /void-packages && git log --oneline -1)

      - name: Bootstrap xbps-src masterdir
        timeout-minutes: 20
        working-directory: /void-packages
        run: |
          set -eux
          # Mirror the same Fastly choice inside the masterdir so package
          # builds fetch their build-time deps over the CDN.
          sudo -Eu builder tee etc/conf > /dev/null <<'EOF'
          XBPS_BINPKG_REPO=https://repo-fastly.voidlinux.org/current
          EOF
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Lint all new templates
        working-directory: /void-packages
        run: |
          {
            echo "## xlint"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"
          failed=0
          for pkg in ${PACKAGES}; do
            out=$(xlint "srcpkgs/${pkg}/template" 2>&1 || true)
            if [ -n "${out}" ]; then
              {
                echo "- ⚠️ \`${pkg}\`"
                echo '```'
                echo "${out}"
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            else
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            fi
          done
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**${failed} lint warnings** across packages." \
            >> "${GITHUB_STEP_SUMMARY}"

      - name: Build all packages in dependency order
        timeout-minutes: 90
        working-directory: /void-packages
        run: |
          set -o pipefail
          {
            echo ""
            echo "## xbps-src pkg"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for pkg in ${PACKAGES}; do
            echo "--- Building ${pkg} ---"
            log=$(mktemp)
            if sudo -Eu builder ./xbps-src pkg "${pkg}" > "${log}" 2>&1; then
              tail --lines=20 "${log}"
              echo "- ✅ \`${pkg}\`" >> "${GITHUB_STEP_SUMMARY}"
            else
              # On failure, surface the last 200 lines plus any explicit
              # FAILED/ERROR markers for fast diagnosis.
              echo "=== FAILED markers ==="
              grep -E "^FAILED|^ERROR|=> ERROR|short test summary" "${log}" \
                || true
              echo "=== last 200 lines ==="
              tail --lines=200 "${log}"
              {
                echo "- ❌ \`${pkg}\`"
                echo '```'
                tail --lines=100 "${log}"
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"
              failed=$((failed + 1))
            fi
            rm --force "${log}"
          done

          total=0
          for pkg in ${PACKAGES}; do
            total=$((total + 1))
          done
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**${failed} failed** out of ${total} packages." \
            >> "${GITHUB_STEP_SUMMARY}"

          if [ "${failed}" -gt 0 ]; then
            exit 1
          fi

      - name: Install and smoke-test mpm
        if: success()
        working-directory: /void-packages
        run: |
          set -eux
          # Install all freshly-built packages from the local hostdir repo
          # and confirm mpm runs end-to-end.
          xbps-install --yes \
            --repository=hostdir/binpkgs \
            mpm
          mpm --version
          mpm --table-format=json managers | head --lines=40
          {
            echo ""
            echo "## End-to-end smoke test"
            echo ""
            echo "- ✅ \`mpm\` installed from local hostdir/binpkgs"
            echo "- ✅ \`mpm --version\` and \`mpm managers\` ran"
          } >> "${GITHUB_STEP_SUMMARY}"
