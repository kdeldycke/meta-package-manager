---
name: 🧹 Lint
"on":
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - prepare-release
      - "renovate/**"

jobs:

  lint:
    uses: kdeldycke/repomatic/.github/workflows/lint.yaml@3c1df298482d99849c4390ef91587a946b9445cc # v6.17.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
