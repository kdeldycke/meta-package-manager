---
name: 🚀 Build & release
"on":
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - prepare-release
      - "renovate/**"
    paths:
      - "meta_package_manager/**"
      - "tests/**"
      - pyproject.toml
      - uv.lock
      - .github/workflows/release.yaml
  workflow_dispatch:

jobs:

  release:
    uses: kdeldycke/repomatic/.github/workflows/release.yaml@204a868c5345477f62a29715d2838ac1c6daa3ee # v6.9.0
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
