---
name: 🆕 Renovate
"on":
  schedule:
    - cron: "3 17 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@204a868c5345477f62a29715d2838ac1c6daa3ee # v6.9.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
