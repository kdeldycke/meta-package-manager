---
name: 🆕 Renovate
"on":
  schedule:
    - cron: "3 17 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@da519582a030bccb8d204e2ab3f61343e6c349e5 # v6.11.2
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
