---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@bc1a04cee565d9ccdf32b167972799b66dfbf3a6 # v6.18.2
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
