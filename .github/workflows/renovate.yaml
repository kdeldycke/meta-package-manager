---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@e8e1f6c651ed0c51dd6622cf316f3f7f591ed3dc # v6.30.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
