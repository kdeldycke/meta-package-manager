---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@3a04e66e0f653c320bf6e93a8d584f4bf9605a50 # v6.31.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
