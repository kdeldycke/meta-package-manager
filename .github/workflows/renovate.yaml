---
name: 🆕 Renovate
"on":
  schedule:
    - cron: "3 17 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@44d6f69616d5c0c125ce1c35c95b82f4fb6e76e1 # v6.13.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
