---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@6b9586282b103feae63e773c15f788f7d37848bd # v6.29.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
