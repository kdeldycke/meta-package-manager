---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@a6458162963b57814a69421fed1f969cbbe1d2b6 # v6.28.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
