---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@9d29583b0b0ca24db08a04e7fe03aa7990e045b5 # v6.23.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
