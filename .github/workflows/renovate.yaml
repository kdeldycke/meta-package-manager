---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@3a17c23f13a90fb3a80dac2ea01b40665990939b # v6.18.3
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
