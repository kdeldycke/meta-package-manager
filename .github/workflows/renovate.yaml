---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@86620138002b34a18678953b6eb63d09cdc22ce6 # v6.25.1
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
