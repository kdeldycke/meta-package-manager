---
name: 🆕 Renovate
"on":
  schedule:
    - cron: "3 17 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@09b06a00c592eef7f7a3623563e73a443016b3e2 # v6.9.1.dev0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
