---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@c6defb901773fe1f8f2f5d04d22facfb8f795c4d # v6.19.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
