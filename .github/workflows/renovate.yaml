---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@3c1df298482d99849c4390ef91587a946b9445cc # v6.17.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
