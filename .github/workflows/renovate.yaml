---
name: 🆕 Renovate
"on":
  schedule:
    - cron: "3 17 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@f600fefb41f28a11f550f43d8145b96438e46b84 # v6.14.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
