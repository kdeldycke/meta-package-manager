---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@7b003a95093db88752f32cbcc1c736081821720d # v6.16.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
