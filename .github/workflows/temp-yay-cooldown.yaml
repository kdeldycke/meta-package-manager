---
name: "Temp - yay cooldown live test"

# TEMPORARY workflow. Probes how a real Arch Linux + yay >= 13 surfaces AUR
# package metadata to init.lua hooks, to validate the mpm yay --cooldown overlay.
# Manual dispatch only; delete once the behavior is pinned down.
#
# Currently in DIAGNOSTIC mode: it drives yay directly with hand-written init.lua
# overlays (no mpm) to answer three questions the source could not settle:
#   1. Does an AURPreInstall hook fire during a plain `yay -S`?
#   2. What `last_modified` value does it see for the package?
#   3. Does `yay.abort()` inside AURPreInstall actually stop the install?
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

"on":
  workflow_dispatch:
    inputs:
      aur-package:
        description: >
          A small AUR-only package (absent from the official repos) for the
          probe. Must build quickly and pull no heavy dependencies.
        default: downgrade
        type: string

permissions:
  contents: read

jobs:

  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel git nodejs python sudo

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Write the diagnostic probe
        run: |
          cat > yay_cooldown_probe.py <<'PY'
          """Probe a real yay's AURPreInstall hook behavior (no mpm involved)."""

          from __future__ import annotations

          import os
          import subprocess
          from pathlib import Path

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])
          probe_log = home / "probe.log"

          # Log-only hook: record whether it fires and the last_modified it sees.
          PROBE_LOG_LUA = r'''
          local log = os.getenv("HOME") .. "/probe.log"
          local function w(s)
            local f = io.open(log, "a")
            if f then f:write(s .. "\n"); f:close() end
          end
          w("init.lua loaded")
          yay.create_autocmd("AURPreInstall", {
            desc = "probe-log",
            callback = function(event)
              w("AURPreInstall fired: match=" .. tostring(event.match)
                .. " last_modified=" .. tostring(event.data.last_modified)
                .. " version=" .. tostring(event.data.version))
            end,
          })
          '''

          # Abort hook: does yay.abort() in AURPreInstall stop a plain -S?
          PROBE_ABORT_LUA = r'''
          yay.create_autocmd("AURPreInstall", {
            desc = "probe-abort",
            callback = function(event)
              yay.abort("PROBE ABORT: " .. tostring(event.match))
            end,
          })
          '''


          def write_overlay(name: str, lua: str) -> Path:
              root = home / name
              (root / "yay").mkdir(parents=True, exist_ok=True)
              (root / "yay" / "init.lua").write_text(lua, encoding="UTF-8")
              return root


          def run_yay(overlay: Path, *args: str) -> None:
              env = {**os.environ, "XDG_CONFIG_HOME": str(overlay)}
              subprocess.run(["yay", *args], env=env, text=True)


          def installed(name: str) -> bool:
              return subprocess.run(["pacman", "--query", name]).returncode == 0


          print(f"=== probe 1: log-only AURPreInstall on `yay -S {pkg}` ===", flush=True)
          probe_log.unlink(missing_ok=True)
          run_yay(write_overlay("probe-log", PROBE_LOG_LUA), "--sync", "--noconfirm", pkg)
          print("--- probe.log ---", flush=True)
          if probe_log.exists():
              print(probe_log.read_text(), flush=True)
          else:
              print("MISSING: init.lua never wrote (hook never fired / not loaded)", flush=True)
          print(f"{pkg} installed after probe 1: {installed(pkg)}", flush=True)
          if installed(pkg):
              subprocess.run(["sudo", "pacman", "--remove", "--noconfirm", pkg])

          print(f"\n=== probe 2: aborting AURPreInstall on `yay -S {pkg}` ===", flush=True)
          run_yay(write_overlay("probe-abort", PROBE_ABORT_LUA), "--sync", "--noconfirm", pkg)
          blocked = not installed(pkg)
          verdict = "WORKED" if blocked else "did NOT work"
          print(f"{pkg} installed after probe 2: {not blocked}  (abort {verdict})", flush=True)

          print("\nDIAGNOSTIC COMPLETE", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      - name: Install yay from the AUR
        run: >
          sudo --set-home --user builder bash -c
          'git clone --depth 1 https://aur.archlinux.org/yay-bin.git /tmp/yay-bin
          && cd /tmp/yay-bin
          && makepkg --install --syncdeps --noconfirm'

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Run the diagnostic probe
        env:
          AUR_PACKAGE: ${{ inputs.aur-package }}
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          python yay_cooldown_probe.py
