---
name: "Temp - yay cooldown live test"

# TEMPORARY workflow. Cold-path bisection of the mpm yay --cooldown overlay against a
# real Arch Linux + yay >= 13. A warm install (deps present) gates correctly, but a
# cold first install (unmet sync deps) of downgrade did not. This isolates whether the
# config.json or the full mpm overlay breaks AURPreInstall on the cold path, vs a
# simple overlay. Manual dispatch only; delete once root-caused.
#
# Each case is forced cold by removing downgrade + its sync deps first, and logs
# LOADED/REGISTERED/FIRED markers so we can tell where it diverges.
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

"on":
  workflow_dispatch:
    inputs:
      aur-package:
        description: "A small AUR-only package for the probe."
        default: downgrade
        type: string

permissions:
  contents: read

jobs:

  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel curl git nodejs python sudo uv

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Write the cold-path bisection
        run: |
          cat > yay_cooldown_probe.py <<'PY'
          """Cold-path bisection: which overlay element breaks AURPreInstall cold."""

          from __future__ import annotations

          import os
          import subprocess
          from datetime import timedelta
          from pathlib import Path

          from meta_package_manager.managers.pacman import Yay

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])
          log = home / "diag.log"
          cutoff = "1779717121"  # below downgrade's last_modified -> block expected.

          user_yay = home / ".config" / "yay"
          user_yay.mkdir(parents=True, exist_ok=True)
          (user_yay / "init.lua").write_text(
              'local f = io.open(os.getenv("HOME") .. "/.config/yay/sent", "w")\n'
              'if f then f:write("x"); f:close() end\n',
              encoding="UTF-8",
          )
          (user_yay / "config.json").write_text("{}\n", encoding="UTF-8")

          WD = (
              'local function wd(s)\n'
              '  local f = io.open(os.getenv("HOME") .. "/diag.log", "a")\n'
              '  if f then f:write(s .. "\\n"); f:close() end\n'
              'end\n'
          )
          SIMPLE = WD + (
              'wd("LOADED simple")\n'
              'yay.create_autocmd("AURPreInstall", {\n'
              '  desc = "c",\n'
              '  callback = function(event)\n'
              '    wd("FIRED lm=" .. tostring(event.data.last_modified))\n'
              '    yay.abort("COLD ABORT")\n'
              '  end,\n'
              '})\n'
              'wd("REGISTERED simple")\n'
          )
          DIAG = (
              '\n' + WD
              + 'wd("LOADED mpm-end")\n'
              'yay.create_autocmd("AURPreInstall", {\n'
              '  desc = "diag",\n'
              '  callback = function(event)\n'
              '    wd("DIAG FIRED lm=" .. tostring(event.data.last_modified))\n'
              '  end,\n'
              '})\n'
              'wd("REGISTERED diag")\n'
          )


          def installed(name: str) -> bool:
              return subprocess.run(["pacman", "--query", name]).returncode == 0


          def reset_cold() -> None:
              for p in ("downgrade", "fzf", "pacman-contrib"):
                  if installed(p):
                      subprocess.run(
                          ["sudo", "pacman", "--remove", "--nosave", "--noconfirm", p]
                      )
              # Clear yay's build/clone cache so each case is a true first-ever clone.
              subprocess.run(["rm", "-rf", str(home / ".cache" / "yay")])


          def run_case(name: str, env: dict[str, str]) -> None:
              log.unlink(missing_ok=True)
              reset_cold()
              print(f"\n=== {name} (cold; expect BLOCK) ===", flush=True)
              subprocess.run(["yay", "--sync", "--noconfirm", pkg], env=env, text=True)
              trace = log.read_text().strip() if log.exists() else "(no diag.log)"
              print(f"{name}: blocked={not installed(pkg)} | trace: {trace!r}", flush=True)


          def mpm_overlay_env() -> dict[str, str]:
              manager = Yay()
              manager.cooldown = timedelta(days=365)
              env = {**os.environ, **manager.cooldown_env()}
              init = Path(env["XDG_CONFIG_HOME"]) / "yay" / "init.lua"
              init.write_text(init.read_text() + DIAG, encoding="UTF-8")
              return env

          def simple_env(name: str, with_config: bool) -> dict[str, str]:
              ov = home / name
              (ov / "yay").mkdir(parents=True, exist_ok=True)
              (ov / "yay" / "init.lua").write_text(SIMPLE, encoding="UTF-8")
              if with_config:
                  (ov / "yay" / "config.json").write_text("{}\n", encoding="UTF-8")
              return {
                  **os.environ,
                  "XDG_CONFIG_HOME": str(ov),
                  "MPM_COOLDOWN_EPOCH": cutoff,
              }

          # A: mpm's real overlay, true first-ever clone (the scenario that failed).
          run_case("A mpm real overlay (true cold)", mpm_overlay_env())
          # B: simple overlay, true first-ever clone (control).
          run_case("B simple overlay (true cold)", simple_env("b", with_config=False))
          # C: mpm's real overlay again, true cold (reproducibility).
          run_case("C mpm real overlay (true cold, repeat)", mpm_overlay_env())

          reset_cold()
          print("\nCOLD BISECTION COMPLETE", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      # Install yay from its GitHub release rather than building yay-bin from the AUR:
      # the AUR git endpoint flakes intermittently, GitHub is reliable.
      - name: Install yay from its GitHub release
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/Jguer/yay/releases/download/v13.0.1/yay_13.0.1_x86_64.tar.gz \
            --output /tmp/yay.tar.gz
          tar --extract --gzip --file /tmp/yay.tar.gz --directory /tmp
          install -Dm755 /tmp/yay_13.0.1_x86_64/yay /usr/bin/yay

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Run the cold-path bisection
        env:
          AUR_PACKAGE: ${{ inputs.aur-package }}
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          uv run --frozen python yay_cooldown_probe.py
