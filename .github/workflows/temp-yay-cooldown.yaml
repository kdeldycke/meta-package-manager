---
name: "Temp - yay cooldown live test"

# TEMPORARY workflow. mpm's full overlay STRUCTURE gates first-clone installs fine
# (W-series), but mpm's real cooldown_env() overlay does not. The only remaining
# difference is that cooldown_env() makes config.json a SYMLINK to the user's config,
# while the working reconstructions used a regular file. This tests mpm's real overlay
# both ways. Manual dispatch only.
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

"on":
  workflow_dispatch:
    inputs:
      aur-package:
        description: "A small AUR-only package for the probe."
        default: downgrade
        type: string

permissions:
  contents: read

jobs:

  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel curl git nodejs python sudo uv

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Write the symlink probe
        run: |
          cat > yay_cooldown_probe.py <<'PY'
          """Test mpm's real overlay with config.json as a symlink vs a regular file."""

          from __future__ import annotations

          import os
          import subprocess
          from datetime import timedelta
          from pathlib import Path

          from meta_package_manager.managers.pacman import Yay

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])
          log = home / "diag.log"

          # A real user config so cooldown_env() has something to symlink.
          user_yay = home / ".config" / "yay"
          user_yay.mkdir(parents=True, exist_ok=True)
          (user_yay / "init.lua").write_text(
              'local f = io.open(os.getenv("HOME") .. "/.config/yay/sent", "w")\n'
              'if f then f:write("x"); f:close() end\n',
              encoding="UTF-8",
          )
          (user_yay / "config.json").write_text("{}\n", encoding="UTF-8")

          END = (
              '\nlocal function wd(s)\n'
              '  local f = io.open(os.getenv("HOME") .. "/diag.log", "a")\n'
              '  if f then f:write(s .. "\\n"); f:close() end\n'
              'end\n'
              'wd("END reached")\n'
              'yay.create_autocmd("AURPreInstall", {\n'
              '  desc = "diag",\n'
              '  callback = function(event)\n'
              '    wd("DIAG FIRED lm=" .. tostring(event.data.last_modified))\n'
              '  end,\n'
              '})\n'
          )


          def build(copy_config: bool) -> dict[str, str]:
              manager = Yay()
              manager.cooldown = timedelta(days=365)
              env = {**os.environ, **manager.cooldown_env()}
              ovyay = Path(env["XDG_CONFIG_HOME"]) / "yay"
              init = ovyay / "init.lua"
              init.write_text(init.read_text() + END, encoding="UTF-8")
              cfg = ovyay / "config.json"
              print(f"  config.json is_symlink={cfg.is_symlink()}", flush=True)
              if copy_config and cfg.is_symlink():
                  content = cfg.read_text()
                  cfg.unlink()
                  cfg.write_text(content, encoding="UTF-8")
                  print("  -> replaced symlink with a regular file", flush=True)
              return env


          def installed(name: str) -> bool:
              return subprocess.run(["pacman", "--query", name]).returncode == 0


          def reset_cold() -> None:
              for p in ("downgrade", "fzf", "pacman-contrib"):
                  if installed(p):
                      subprocess.run(
                          ["sudo", "pacman", "--remove", "--nosave", "--noconfirm", p]
                      )
              subprocess.run(["rm", "-rf", str(home / ".cache" / "yay")])


          def run_case(name: str, env: dict[str, str]) -> None:
              log.unlink(missing_ok=True)
              reset_cold()
              print(f"\n=== {name} (true cold; expect BLOCK) ===", flush=True)
              subprocess.run(["yay", "--sync", "--noconfirm", pkg], env=env, text=True)
              trace = log.read_text().strip() if log.exists() else "(no diag.log)"
              print(f"{name}: blocked={not installed(pkg)} | trace: {trace!r}", flush=True)


          run_case("REAL (config.json symlink)", build(copy_config=False))
          run_case("COPYCFG (config.json regular file)", build(copy_config=True))
          reset_cold()
          print("\nDONE", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      - name: Install yay from its GitHub release
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/Jguer/yay/releases/download/v13.0.1/yay_13.0.1_x86_64.tar.gz \
            --output /tmp/yay.tar.gz
          tar --extract --gzip --file /tmp/yay.tar.gz --directory /tmp
          install -Dm755 /tmp/yay_13.0.1_x86_64/yay /usr/bin/yay

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Run the symlink probe
        env:
          AUR_PACKAGE: ${{ inputs.aur-package }}
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          uv run --frozen python yay_cooldown_probe.py
