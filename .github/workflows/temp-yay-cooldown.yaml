---
name: "Temp - yay cooldown live test"

# TEMPORARY workflow. The mpm cooldown hook logic gates first-clone installs fine
# (Z-series), but mpm's REAL init.lua text does not. This tests the two structural
# elements unique to the real text - the `if cutoff then` wrapper and the chaining
# block (parsed even when skipped) - added to the known-good core, config.json + /tmp,
# true cold clone. Manual dispatch only.
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

"on":
  workflow_dispatch:
    inputs:
      aur-package:
        description: "A small AUR-only package for the probe."
        default: downgrade
        type: string

permissions:
  contents: read

jobs:

  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel curl git nodejs python sudo uv

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Write the structural probe
        run: |
          cat > yay_cooldown_probe.py <<'PY'
          """Test the structural elements unique to mpm's real init.lua text."""

          from __future__ import annotations

          import os
          import subprocess
          import tempfile
          from pathlib import Path

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])
          log = home / "diag.log"
          cutoff = "1779717121"

          WD = (
              'local function wd(s)\n'
              '  local f = io.open(os.getenv("HOME") .. "/diag.log", "a")\n'
              '  if f then f:write(s .. "\\n"); f:close() end\n'
              'end\n'
              'local cutoff = tonumber(os.getenv("MPM_COOLDOWN_EPOCH"))\n'
              'wd("START")\n'
          )
          CHAIN_BLOCK = (
              'local user_dir = os.getenv("MPM_YAY_USER_DIR")\n'
              'if user_dir and user_dir ~= "" then\n'
              '  package.path = user_dir .. "/?.lua;" .. user_dir .. "/?/init.lua;" .. package.path\n'
              '  local h = io.open(user_dir .. "/init.lua", "r")\n'
              '  if h then\n'
              '    h:close()\n'
              '    local ok, err = pcall(dofile, user_dir .. "/init.lua")\n'
              '    if not ok then yay.log.error("user init failed: " .. tostring(err)) end\n'
              '  end\n'
              'end\n'
          )
          REAL_UPSEL = (
              'yay.create_autocmd("UpgradeSelect", {\n'
              '  desc = "u",\n'
              '  callback = function(event)\n'
              '    local exclude = {}\n'
              '    for _, p in ipairs(event.data.upgrades) do\n'
              '      if p.repository == "aur" and p.last_modified >= cutoff then\n'
              '        yay.log.info("hold " .. p.name); table.insert(exclude, p.name)\n'
              '      end\n'
              '    end\n'
              '    return { exclude = exclude }\n'
              '  end,\n'
              '})\n'
          )
          REAL_AUR = (
              'yay.create_autocmd("AURPreInstall", {\n'
              '  desc = "a",\n'
              '  callback = function(event)\n'
              '    if event.data.last_modified and event.data.last_modified >= cutoff then\n'
              '      wd("FIRED lm=" .. tostring(event.data.last_modified))\n'
              '      yay.abort("mpm cooldown: " .. event.match .. " is newer than floor")\n'
              '    end\n'
              '  end,\n'
              '})\n'
          )
          END = 'wd("END")\n'
          HOOKS = REAL_UPSEL + REAL_AUR

          VARIANTS = {
              "W1 core + if-cutoff wrapper": WD + "if cutoff then\n" + HOOKS + "end\n" + END,
              "W2 core + chaining block": WD + CHAIN_BLOCK + HOOKS + END,
              "W3 core + wrapper + chaining (= mpm)": (
                  WD + CHAIN_BLOCK + "if cutoff then\n" + HOOKS + "end\n" + END
              ),
          }


          def installed(name: str) -> bool:
              return subprocess.run(["pacman", "--query", name]).returncode == 0


          def reset_cold() -> None:
              for p in ("downgrade", "fzf", "pacman-contrib"):
                  if installed(p):
                      subprocess.run(
                          ["sudo", "pacman", "--remove", "--nosave", "--noconfirm", p]
                      )
              subprocess.run(["rm", "-rf", str(home / ".cache" / "yay")])


          results = {}
          for name, lua in VARIANTS.items():
              log.unlink(missing_ok=True)
              reset_cold()
              root = Path(tempfile.mkdtemp(prefix="mpm-yay-cooldown-"))
              ov = root / "yay"
              ov.mkdir(parents=True, exist_ok=True)
              (ov / "init.lua").write_text(lua, encoding="UTF-8")
              (ov / "config.json").write_text("{}\n", encoding="UTF-8")
              env = {**os.environ, "XDG_CONFIG_HOME": str(root), "MPM_COOLDOWN_EPOCH": cutoff}
              print(f"\n=== {name} (true cold; expect BLOCK) ===", flush=True)
              subprocess.run(["yay", "--sync", "--noconfirm", pkg], env=env, text=True)
              results[name] = not installed(pkg)
              trace = log.read_text().strip() if log.exists() else "(no diag.log)"
              print(f"{name}: blocked={results[name]} | trace: {trace!r}", flush=True)

          reset_cold()
          print("\n=== SUMMARY ===", flush=True)
          for name in VARIANTS:
              print(f"  {name}: {'BLOCKED' if results[name] else 'INSTALLED (not gated)'}", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      - name: Install yay from its GitHub release
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/Jguer/yay/releases/download/v13.0.1/yay_13.0.1_x86_64.tar.gz \
            --output /tmp/yay.tar.gz
          tar --extract --gzip --file /tmp/yay.tar.gz --directory /tmp
          install -Dm755 /tmp/yay_13.0.1_x86_64/yay /usr/bin/yay

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Run the structural probe
        env:
          AUR_PACKAGE: ${{ inputs.aur-package }}
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          uv run --frozen python yay_cooldown_probe.py
