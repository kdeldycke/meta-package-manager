---
name: "Temp - yay cooldown live test"

# TEMPORARY workflow. Tests the hypothesis that mpm's overlay vanishes because
# _cooldown_overlay_dir registers weakref.finalize(self, rmtree): when the throwaway
# Yay instance is GC'd, the overlay is deleted before yay runs, silently failing the
# cooldown open. Compares manager-dropped vs manager-kept-alive, checking whether the
# overlay's init.lua still exists right before yay runs. Manual dispatch only.
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

"on":
  workflow_dispatch:
    inputs:
      aur-package:
        description: "A small AUR-only package for the probe."
        default: downgrade
        type: string

permissions:
  contents: read

jobs:

  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel curl git nodejs python sudo uv

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Write the lifetime probe
        run: |
          cat > yay_cooldown_probe.py <<'PY'
          """Test whether GC of the Yay instance deletes the overlay before yay runs."""

          from __future__ import annotations

          import gc
          import os
          import subprocess
          from datetime import timedelta
          from pathlib import Path

          from meta_package_manager.managers.pacman import Yay

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])


          def build() -> tuple[dict[str, str], Yay]:
              manager = Yay()
              manager.cooldown = timedelta(days=365)
              env = {**os.environ, **manager.cooldown_env()}
              return env, manager


          def overlay_init(env: dict[str, str]) -> Path:
              return Path(env["XDG_CONFIG_HOME"]) / "yay" / "init.lua"


          def installed(name: str) -> bool:
              return subprocess.run(["pacman", "--query", name]).returncode == 0


          def reset_cold() -> None:
              for p in ("downgrade", "fzf", "pacman-contrib"):
                  if installed(p):
                      subprocess.run(
                          ["sudo", "pacman", "--remove", "--nosave", "--noconfirm", p]
                      )
              subprocess.run(["rm", "-rf", str(home / ".cache" / "yay")])


          def run_case(name: str, env: dict[str, str]) -> None:
              reset_cold()
              print(f"\n=== {name} (expect BLOCK) ===", flush=True)
              print(f"  init.lua exists before yay: {overlay_init(env).exists()}", flush=True)
              subprocess.run(["yay", "--sync", "--noconfirm", pkg], env=env, text=True)
              print(f"  init.lua exists after yay:  {overlay_init(env).exists()}", flush=True)
              print(f"{name}: blocked={not installed(pkg)}", flush=True)


          # GC case: drop the manager so weakref.finalize can fire.
          env_gc, manager_gc = build()
          del manager_gc
          gc.collect()
          run_case("GC (manager dropped)", env_gc)

          # ALIVE case: keep a reference to the manager (mirrors mpm's long-lived pool).
          env_alive, manager_alive = build()
          run_case("ALIVE (manager kept)", env_alive)
          print(f"(manager_alive still referenced: {manager_alive is not None})", flush=True)

          reset_cold()
          print("\nDONE", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      - name: Install yay from its GitHub release
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/Jguer/yay/releases/download/v13.0.1/yay_13.0.1_x86_64.tar.gz \
            --output /tmp/yay.tar.gz
          tar --extract --gzip --file /tmp/yay.tar.gz --directory /tmp
          install -Dm755 /tmp/yay_13.0.1_x86_64/yay /usr/bin/yay

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Run the lifetime probe
        env:
          AUR_PACKAGE: ${{ inputs.aur-package }}
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          uv run --frozen python yay_cooldown_probe.py
