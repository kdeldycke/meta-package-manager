---
name: "Temp - yay cooldown live test"

# TEMPORARY workflow. Isolates which single element of mpm's cooldown overlay breaks
# the AURPreInstall hook on a true first-ever clone of an AUR package with unmet sync
# deps (the simple overlay works there; mpm's full overlay does not). Each case is a
# true cold clone (downgrade + deps removed, yay cache cleared) and logs markers.
# Manual dispatch only; delete once root-caused.
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

"on":
  workflow_dispatch:
    inputs:
      aur-package:
        description: "A small AUR-only package for the probe."
        default: downgrade
        type: string

permissions:
  contents: read

jobs:

  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel curl git nodejs python sudo uv

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Write the first-clone isolation probe
        run: |
          cat > yay_cooldown_probe.py <<'PY'
          """Isolate which overlay element breaks AURPreInstall on a true first clone."""

          from __future__ import annotations

          import os
          import subprocess
          from pathlib import Path

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])
          log = home / "diag.log"
          cutoff = "1779717121"  # below downgrade's last_modified -> abort if it fires.

          user_yay = home / ".config" / "yay"
          user_yay.mkdir(parents=True, exist_ok=True)
          (user_yay / "init.lua").write_text(
              'local f = io.open(os.getenv("HOME") .. "/.config/yay/sent", "w")\n'
              'if f then f:write("x"); f:close() end\n',
              encoding="UTF-8",
          )

          WD = (
              'local function wd(s)\n'
              '  local f = io.open(os.getenv("HOME") .. "/diag.log", "a")\n'
              '  if f then f:write(s .. "\\n"); f:close() end\n'
              'end\n'
          )
          ABORT_HOOK = (
              'yay.create_autocmd("AURPreInstall", {\n'
              '  desc = "h",\n'
              '  callback = function(event)\n'
              '    wd("FIRED lm=" .. tostring(event.data.last_modified))\n'
              '    yay.abort("ABORT")\n'
              '  end,\n'
              '})\n'
              'wd("REGISTERED")\n'
          )
          CHAIN = (
              'wd("LOADED")\n'
              'local user_dir = os.getenv("MPM_YAY_USER_DIR")\n'
              'if user_dir and user_dir ~= "" then\n'
              '  package.path = user_dir .. "/?.lua;" .. user_dir .. "/?/init.lua;" .. package.path\n'
              '  local h = io.open(user_dir .. "/init.lua", "r")\n'
              '  if h then h:close(); pcall(dofile, user_dir .. "/init.lua") end\n'
              'end\n'
              'wd("CHAIN done")\n'
          )
          UPSEL = (
              'wd("LOADED")\n'
              'yay.create_autocmd("UpgradeSelect", {\n'
              '  desc = "u", callback = function(event) return { exclude = {} } end,\n'
              '})\n'
          )

          # X1 chaining only, X2 config.json only, X3 UpgradeSelect only, X4 simple.
          VARIANTS = {
              "X1 chaining": (WD + CHAIN + ABORT_HOOK, False, True),
              "X2 config.json": (WD + 'wd("LOADED")\n' + ABORT_HOOK, True, False),
              "X3 UpgradeSelect": (WD + UPSEL + ABORT_HOOK, False, False),
              "X4 simple baseline": (WD + 'wd("LOADED")\n' + ABORT_HOOK, False, False),
          }


          def installed(name: str) -> bool:
              return subprocess.run(["pacman", "--query", name]).returncode == 0


          def reset_cold() -> None:
              for p in ("downgrade", "fzf", "pacman-contrib"):
                  if installed(p):
                      subprocess.run(
                          ["sudo", "pacman", "--remove", "--nosave", "--noconfirm", p]
                      )
              subprocess.run(["rm", "-rf", str(home / ".cache" / "yay")])


          results = {}
          for name, (lua, with_config, chaining) in VARIANTS.items():
              log.unlink(missing_ok=True)
              reset_cold()
              ov = home / name.split()[0].lower()
              (ov / "yay").mkdir(parents=True, exist_ok=True)
              (ov / "yay" / "init.lua").write_text(lua, encoding="UTF-8")
              if with_config:
                  (ov / "yay" / "config.json").write_text("{}\n", encoding="UTF-8")
              env = {**os.environ, "XDG_CONFIG_HOME": str(ov), "MPM_COOLDOWN_EPOCH": cutoff}
              if chaining:
                  env["MPM_YAY_USER_DIR"] = str(user_yay)
              print(f"\n=== {name} (true cold; expect BLOCK) ===", flush=True)
              subprocess.run(["yay", "--sync", "--noconfirm", pkg], env=env, text=True)
              results[name] = not installed(pkg)
              trace = log.read_text().strip() if log.exists() else "(no diag.log)"
              print(f"{name}: blocked={results[name]} | trace: {trace!r}", flush=True)

          reset_cold()
          print("\n=== SUMMARY ===", flush=True)
          for name in VARIANTS:
              print(f"  {name}: {'BLOCKED' if results[name] else 'INSTALLED (not gated)'}", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      # Install yay from its GitHub release rather than building yay-bin from the AUR:
      # the AUR git endpoint flakes intermittently, GitHub is reliable.
      - name: Install yay from its GitHub release
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/Jguer/yay/releases/download/v13.0.1/yay_13.0.1_x86_64.tar.gz \
            --output /tmp/yay.tar.gz
          tar --extract --gzip --file /tmp/yay.tar.gz --directory /tmp
          install -Dm755 /tmp/yay_13.0.1_x86_64/yay /usr/bin/yay

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Run the first-clone isolation probe
        env:
          AUR_PACKAGE: ${{ inputs.aur-package }}
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          uv run --frozen python yay_cooldown_probe.py
