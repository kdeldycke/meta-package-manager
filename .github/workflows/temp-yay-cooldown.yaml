---
name: "Temp - yay cooldown live test"

# TEMPORARY workflow. Validates the mpm yay --cooldown overlay (Yay.cooldown_env /
# supports_cooldown) against a real Arch Linux + yay >= 13 environment, which the
# hermetic unit layer cannot cover. Manual dispatch only; delete once confirmed.
#
# It drives yay directly with the environment mpm's cooldown_env() produces, rather
# than through `mpm install`: mpm prefixes yay with sudo (correct for raw pacman),
# and yay refuses to build as root. Running yay as the unprivileged build user is
# the faithful way to exercise the AURPreInstall hook the overlay delivers. Each
# case appends a diagnostic hook that logs the last_modified/cutoff yay's hook sees
# if mpm's own hook does not abort.
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

"on":
  workflow_dispatch:
    inputs:
      aur-package:
        description: >
          A small AUR-only package (absent from the official repos) for the
          install A/B test. Must build quickly and pull no heavy dependencies.
        default: downgrade
        type: string

permissions:
  contents: read

jobs:

  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel git nodejs python sudo uv

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Write the live validator
        run: |
          cat > yay_cooldown_validate.py <<'PY'
          """Validate mpm's real yay cooldown overlay end-to-end against a live yay."""

          from __future__ import annotations

          import os
          import subprocess
          from datetime import timedelta
          from pathlib import Path

          from meta_package_manager.managers.pacman import Yay

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])
          diag_log = home / "diag.log"

          # A user config the overlay must preserve: a sentinel-writing init.lua proves
          # the overlay chains it instead of shadowing it.
          user_yay = home / ".config" / "yay"
          user_yay.mkdir(parents=True, exist_ok=True)
          sentinel = user_yay / "chained.sentinel"
          (user_yay / "init.lua").write_text(
              'local f = io.open(os.getenv("HOME") .. "/.config/yay/chained.sentinel", "w")\n'
              'if f then f:write("loaded"); f:close() end\n',
              encoding="UTF-8",
          )
          (user_yay / "config.json").write_text("{}\n", encoding="UTF-8")

          # Appended after mpm's own hooks: fires (and logs) only if mpm's AURPreInstall
          # did NOT abort, so we can see the last_modified/cutoff it was given.
          DIAG = (
              '\nlocal function wd(s)\n'
              '  local f = io.open(os.getenv("HOME") .. "/diag.log", "a")\n'
              '  if f then f:write(s .. "\\n"); f:close() end\n'
              'end\n'
              'yay.create_autocmd("AURPreInstall", {\n'
              '  desc = "diag",\n'
              '  callback = function(event)\n'
              '    wd("DIAG fired lm=" .. tostring(event.data.last_modified)\n'
              '      .. " cutoff=" .. tostring(tonumber(os.getenv("MPM_COOLDOWN_EPOCH"))))\n'
              '  end,\n'
              '})\n'
          )


          def installed() -> bool:
              return subprocess.run(["pacman", "--query", pkg]).returncode == 0


          def cleanup() -> None:
              if installed():
                  subprocess.run(["sudo", "pacman", "--remove", "--noconfirm", pkg])


          def overlay_env(delta: timedelta) -> dict[str, str]:
              manager = Yay()
              manager.cooldown = delta
              print(f"yay version: {manager.version}", flush=True)
              assert manager.supports_cooldown, "real yay must advertise cooldown support"
              env = {**os.environ, **manager.cooldown_env()}
              init = Path(env["XDG_CONFIG_HOME"]) / "yay" / "init.lua"
              init.write_text(init.read_text() + DIAG, encoding="UTF-8")
              return env


          # downgrade-style leaf packages are last-modified well within a year, so a
          # 365-day floor holds them back while a 1-second floor lets them through.
          cases = [
              ("365-day cooldown (realistic floor)", timedelta(days=365), True),
              ("40000-day cooldown (epoch clamped to 0)", timedelta(days=40000), True),
              ("1-second cooldown (no real floor)", timedelta(seconds=1), False),
          ]

          first = True
          for label, delta, expect_blocked in cases:
              want = "BLOCKED" if expect_blocked else "ALLOWED"
              print(f"\n=== {label}: expect {want} ===", flush=True)
              cleanup()
              diag_log.unlink(missing_ok=True)
              sentinel.unlink(missing_ok=True)
              env = overlay_env(delta)
              print(f"injected epoch: {env['MPM_COOLDOWN_EPOCH']}", flush=True)
              subprocess.run(
                  ["yay", "--sync", "--noconfirm", pkg], env=env, text=True
              )
              if first:
                  assert sentinel.exists(), "overlay did not chain the user's init.lua"
                  first = False
              blocked = not installed()
              diag = (
                  diag_log.read_text().strip()
                  if diag_log.exists()
                  else "(mpm hook aborted; diag never ran)"
              )
              print(f"{label}: blocked={blocked} | diag: {diag}", flush=True)
              assert blocked == expect_blocked, (
                  f"{label}: expected blocked={expect_blocked}, got {blocked}"
              )

          cleanup()
          print("\nALL LIVE CHECKS PASSED", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      - name: Install yay from the AUR
        run: >
          sudo --set-home --user builder bash -c
          'git clone --depth 1 https://aur.archlinux.org/yay-bin.git /tmp/yay-bin
          && cd /tmp/yay-bin
          && makepkg --install --syncdeps --noconfirm'

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Validate the cooldown overlay against real yay
        env:
          AUR_PACKAGE: ${{ inputs.aur-package }}
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          uv run --frozen python yay_cooldown_validate.py
