---
name: 🏪 Test distributors
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tests-install.yaml
  workflow_dispatch:
  schedule:
    # Run weekly to catch regressions from packaging or distribution changes.
    - cron: "17 9 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Test that the released version of mpm is installable from various package
# managers and distribution channels. None of these jobs test the code being
# pushed; they all install from PyPI, Homebrew, Scoop, GitHub Releases, etc.
#
# Keep in sync with the "Installation methods" section in docs/install.md.

jobs:

  # https://formulae.brew.sh/formula/meta-package-manager
  # https://github.com/Homebrew/homebrew-core/blob/main/Formula/m/meta-package-manager.rb
  brew:
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - if: runner.os == 'Linux'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin/" >> "$GITHUB_PATH"
      - run: brew install meta-package-manager
      - run: mpm --version

  # https://community.chocolatey.org/packages/meta-package-manager
  # https://github.com/kdeldycke/meta-package-manager/tree/main/packaging/chocolatey
  choco:
    strategy:
      matrix:
        os:
          - windows-2025
          - windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - shell: pwsh
        run: choco install meta-package-manager --yes
      - shell: pwsh
        run: mpm --version

  # https://github.com/kdeldycke/meta-package-manager/releases/latest
  # Stew has no non-interactive mode (https://github.com/marwanhawari/stew/issues/91).
  # It prompts for config path, asset selection, and binary rename. Instead of
  # fighting three interactive prompts, download the released binary directly
  # with gh and verify it runs. This validates the same artifact stew would install.
  github-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            asset_pattern: mpm-*-linux-arm64.bin
          - os: ubuntu-slim
            asset_pattern: mpm-*-linux-x64.bin
          - os: macos-15-intel
            asset_pattern: mpm-*-macos-x64.bin
          - os: macos-26
            asset_pattern: mpm-*-macos-arm64.bin
          - os: windows-11-arm
            asset_pattern: mpm-*-windows-arm64.exe
          - os: windows-2025
            asset_pattern: mpm-*-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download mpm binary
        shell: bash
        run: >
          gh release download
          --repo kdeldycke/meta-package-manager
          --pattern "${{ matrix.asset_pattern }}"
          --output mpm
          --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x mpm
      - run: ./mpm --version

  # https://search.nixos.org/packages?query=meta-package-manager
  # https://github.com/NixOS/nixpkgs/blob/master/pkgs/by-name/me/meta-package-manager/package.nix
  nix:
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: cachix/install-nix-action@v31
      - run: nix-env --install --attr nixpkgs.meta-package-manager
      - run: mpm --version

  # AUR builds from source with full test suites. Upstream PKGBUILD check()
  # failures in transitive dependencies (beartype, boltons, etc.) cause
  # cascading build errors that are not fixable from this project. See:
  # https://aur.archlinux.org/packages/meta-package-manager#comment-1065663
  # https://aur.archlinux.org/packages/python-boltons#comment-1065664
  # https://aur.archlinux.org/packages/python-beartype#comment-1065661
  # https://github.com/beartype/beartype/issues/631

  # https://aur.archlinux.org/packages/meta-package-manager
  # https://aur.archlinux.org/packages/meta-package-manager-bin
  pacaur:
    # Container jobs require Docker, which ubuntu-slim does not provide.
    runs-on: ubuntu-24.04
    continue-on-error: true
    container:
      image: greyltc/archlinux-aur:yay
    steps:
      - name: Refresh mirrors
        run: |
          pacman-key --init
          pacman --noconfirm -Sy archlinux-keyring
      - name: Install pacaur
        run: aur-install pacaur
      - run: pacaur --noconfirm -S meta-package-manager
      - run: pacaur --noconfirm -S meta-package-manager-bin
      - run: mpm --version

  # https://aur.archlinux.org/packages/meta-package-manager
  # https://aur.archlinux.org/packages/meta-package-manager-bin
  paru:
    runs-on: ubuntu-24.04
    continue-on-error: true
    container:
      image: greyltc/archlinux-aur:paru
    steps:
      - name: Refresh mirrors
        run: |
          pacman-key --init
          pacman --noconfirm -Sy archlinux-keyring
      - run: paru --noconfirm -S meta-package-manager
      - run: paru --noconfirm -S meta-package-manager-bin
      - run: mpm --version

  # https://pip.pypa.io/en/stable/
  pip:
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
          - windows-11-arm
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install Python
        run: uv --no-progress venv --python 3.14
      - name: Run CLI via pip
        run: |
          pip install meta-package-manager
          mpm                  --version
          meta-package-manager --version

  # https://pipx.pypa.io/
  pipx:
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
          - windows-11-arm
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install Python
        run: uv --no-progress venv --python 3.14
      - name: Run stable CLI via pipx
        run: |
          uv --no-progress tool install pipx
          pipx run                             meta-package-manager --version
          pipx run --spec meta-package-manager mpm                  --version
          pipx run --spec meta-package-manager meta-package-manager --version
          uv --no-progress tool uninstall pipx
      - name: Run dev CLI via pipx
        run: |
          uv --no-progress tool install pipx
          pipx run --spec git+https://github.com/kdeldycke/meta-package-manager mpm                  --version
          pipx run --spec git+https://github.com/kdeldycke/meta-package-manager meta-package-manager --version

  # https://scoop.sh/#/apps?q=meta-package-manager
  # https://github.com/ScoopInstaller/Main/blob/master/bucket/meta-package-manager.json
  scoop:
    strategy:
      matrix:
        os:
          - windows-2025      # x86
          - windows-11-arm    # arm64
    runs-on: ${{ matrix.os }}
    steps:
      - shell: pwsh
        run: |
          iwr get.scoop.sh -outfile 'install.ps1'
          .\install.ps1 -RunAsAdmin
          # Force addition of Scoop shims to PATH for subsequent steps.
          "$env:USERPROFILE\scoop\shims" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
      - shell: pwsh
        run: scoop install main/meta-package-manager
      - shell: pwsh
        run: mpm --version

  # https://docs.astral.sh/uv/
  uv:
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
          - windows-11-arm
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install Python
        run: uv --no-progress venv --python 3.14
      - name: Run stable CLI
        run: |
          uvx           meta-package-manager                                --version
          uvx    --from meta-package-manager        -- mpm                  --version
          uv run --with meta-package-manager        -- mpm                  --version
          uv run --with meta-package-manager        -- meta-package-manager --version
          uv run --with meta-package-manager        -m meta_package_manager --version
          uv run --with meta-package-manager python -m meta_package_manager --version
      - name: Run stable CLI via uv tool
        run: |
          uv --no-progress tool install meta-package-manager
          mpm                  --version
          meta-package-manager --version
          uv --no-progress tool uninstall meta-package-manager
      - name: Run dev CLI
        run: |
          uvx    --from git+https://github.com/kdeldycke/meta-package-manager        -- mpm                  --version
          uvx    --from git+https://github.com/kdeldycke/meta-package-manager        -- meta-package-manager --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager        -- mpm                  --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager        -- meta-package-manager --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager        -m meta_package_manager --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager python -m meta_package_manager --version
      - name: Run dev CLI via uv tool
        run: |
          uv --no-progress tool install git+https://github.com/kdeldycke/meta-package-manager
          mpm                  --version
          meta-package-manager --version

  # https://aur.archlinux.org/packages/meta-package-manager
  # https://aur.archlinux.org/packages/meta-package-manager-bin
  yay:
    runs-on: ubuntu-24.04
    continue-on-error: true
    container:
      image: greyltc/archlinux-aur:yay
    steps:
      - name: Refresh mirrors
        run: |
          pacman-key --init
          pacman --noconfirm -Sy archlinux-keyring
      - run: yay --noconfirm -S meta-package-manager
      - run: yay --noconfirm -S meta-package-manager-bin
      - run: mpm --version

  # https://github.com/lucasgelfond/zerobrew
  # Known Linux failures: https://github.com/lucasgelfond/zerobrew/issues/336
  zerobrew:
    # ZeroBrew has upstream packaging issues on Linux
    # (https://github.com/lucasgelfond/zerobrew/issues/336).
    continue-on-error: true
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            asset: zb-linux-arm64
          - os: ubuntu-slim
            asset: zb-linux-x64
          - os: macos-15-intel
            asset: zb-darwin-x64
          - os: macos-26
            asset: zb-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install ZeroBrew
        run: >
          gh release download v0.2.1
          --repo lucasgelfond/zerobrew
          --pattern "${{ matrix.asset }}"
          --output /usr/local/bin/zb
          --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - run: chmod +x /usr/local/bin/zb
      - name: Initialize ZeroBrew
        run: |
          zb init
          {
            echo "$HOME/.zerobrew/bin"
            echo "$HOME/.local/share/zerobrew/prefix/bin"
            echo "/opt/zerobrew/bin"
          } >> "$GITHUB_PATH"
      - run: zb install meta-package-manager
      - run: mpm --version
