---
name: 🏪 Test distributors
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tests-install.yaml
      - packaging/choco/**
      - packaging/guix/**
      - packaging/macports/**
      - packaging/nix/**
  pull_request:
    paths:
      - .github/workflows/tests-install.yaml
      - packaging/choco/**
      - packaging/guix/**
      - packaging/macports/**
      - packaging/nix/**
  workflow_dispatch:
  schedule:
    # Run weekly to catch regressions from packaging or distribution changes.
    - cron: "17 9 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Test that mpm is installable from each distribution channel. Most jobs
# install the released artifact from external feeds (PyPI, Homebrew, Scoop,
# GitHub Releases, etc.). The `*-source` jobs install from the in-repo
# packaging specs (packaging/choco/, packaging/nix/, packaging/guix/) and
# validate the build instructions documented in docs/install.md.
#
# Keep in sync with the "Installation methods" section in docs/install.md.

jobs:

  # https://formulae.brew.sh/formula/meta-package-manager
  # https://github.com/Homebrew/homebrew-core/blob/main/Formula/m/meta-package-manager.rb
  #
  # OS matrix tracks brew's own support floor, set by the
  # `6.0.0 <https://brew.sh/2026/06/11/homebrew-6.0.0/>`_ release:
  # - Linux: Ubuntu 24.04+ (`brew/pull/21761`). 22.04 is no longer supported
  #   upstream and the matrix carries no 22.04 entry.
  # - macOS: 15+. ``macos-26`` is the current latest GitHub runner; add
  #   ``macos-27`` (Golden Gate) once GitHub ships a runner image.
  # - Intel: ``macos-15-intel`` is the last Intel macOS runner. brew has
  #   announced upcoming Intel deprecation; drop this row when brew flips.
  brew:
    name: "✅ brew (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - if: runner.os == 'Linux'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin/" >> "$GITHUB_PATH"
      - run: brew install meta-package-manager
      - run: mpm --version

  # https://github.com/kdeldycke/meta-package-manager/tree/main/packaging/choco/meta-package-manager
  # Build and install from the in-repo nuspec, mirroring the documented
  # "build from the specs maintained in the repository" path. The package is
  # no longer published to the Chocolatey community repository (submission 6.4.2
  # was rejected at https://github.com/chocolatey/home/issues/395#issuecomment-4378555157
  # over Nuitka antivirus false positives), so the in-repo nuspec is the only
  # supported install route.
  choco-source:
    name: "✅ choco-source (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - windows-2025
          - windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Pack
        shell: pwsh
        working-directory: packaging/choco/meta-package-manager
        run: choco pack --output-directory .
      - name: Install
        shell: pwsh
        working-directory: packaging/choco/meta-package-manager
        run: choco install meta-package-manager --source . --yes
      - shell: pwsh
        run: mpm --version

  # https://github.com/kdeldycke/meta-package-manager/releases/latest
  # Stew has no non-interactive mode (https://github.com/marwanhawari/stew/issues/91).
  # It prompts for config path, asset selection, and binary rename. Instead of
  # fighting three interactive prompts, download the released binary directly
  # with gh and verify it runs. This validates the same artifact stew would install.
  github-release:
    name: "✅ github-release (${{ matrix.os }})"
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            asset_pattern: meta-package-manager-*-linux-arm64.bin
          - os: ubuntu-slim
            asset_pattern: meta-package-manager-*-linux-x64.bin
          - os: macos-15-intel
            asset_pattern: meta-package-manager-*-macos-x64.bin
          - os: macos-26
            asset_pattern: meta-package-manager-*-macos-arm64.bin
          - os: windows-11-arm
            asset_pattern: meta-package-manager-*-windows-arm64.exe
          - os: windows-2025
            asset_pattern: meta-package-manager-*-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download mpm binary
        shell: bash
        run: >
          gh release download
          --repo kdeldycke/meta-package-manager
          --pattern "${{ matrix.asset_pattern }}"
          --output mpm
          --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x mpm
      - run: ./mpm --version

  # https://packages.guix.gnu.org/packages/meta-package-manager/
  # https://codeberg.org/guix/guix/src/branch/master/gnu/packages/package-management.scm
  # meta-package-manager landed in Guix upstream via
  # https://codeberg.org/guix/guix/pulls/8047 (merged into master 2026-06-28).
  # `guix pull` refreshes the local channel to a commit that ships it before
  # installing. Heavyweight (the pull can build for a while) and Linux-only, so
  # keep it continue-on-error.
  guix:
    name: ⁉️ guix
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - name: Install Guix
        run: >
          wget --quiet --output-document=guix-install.sh
          https://git.savannah.gnu.org/cgit/guix.git/plain/etc/guix-install.sh
      - name: Run Guix installer
        run: |
          chmod +x guix-install.sh
          yes | sudo ./guix-install.sh
      - name: Refresh channel and expose the pulled guix
        run: |
          guix pull
          echo "${HOME}/.config/guix/current/bin" >> "${GITHUB_PATH}"
      - name: Install mpm and expose its profile
        run: |
          guix install meta-package-manager
          echo "${HOME}/.guix-profile/bin" >> "${GITHUB_PATH}"
      - run: mpm --version

  # https://github.com/kdeldycke/meta-package-manager/tree/main/packaging/guix
  # The Guix package definition is also maintained locally (it landed upstream
  # via https://codeberg.org/guix/guix/pulls/8047). Install from the in-repo
  # definition to validate the documented build instructions.
  # Guix is Linux-only and the official install script is heavyweight; mark
  # as continue-on-error until the setup is proven stable.
  guix-source:
    name: ⁉️ guix-source
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Guix
        run: >
          wget --quiet --output-document=guix-install.sh
          https://git.savannah.gnu.org/cgit/guix.git/plain/etc/guix-install.sh
      - name: Run Guix installer
        run: |
          chmod +x guix-install.sh
          yes | sudo ./guix-install.sh
      - run: guix install --load-path=./packaging/guix meta-package-manager
      - run: mpm --version

  # https://github.com/kdeldycke/meta-package-manager/tree/main/packaging/macports
  # Build and install from the in-repo Portfile overlay: a local ports tree
  # providing meta-package-manager plus the dependency ports missing from the
  # official macports-ports tree (py-click-extra, py-cloup, py-deepmerge,
  # py-extra-platforms, py-packageurl-python) and a py-boltons version bump
  # (the official port is stuck below mpm's boltons >= 25 floor). Pending
  # submission to https://github.com/macports/macports-ports.
  # MacPorts installer pkgs are built per macOS version, so the asset is
  # resolved from the runner's major version (15 -> Sequoia, 26 -> Tahoe).
  # The overlay is served from /Users/Shared because the unprivileged macports
  # build user cannot read the runner workspace under /Users/runner.
  # The macos-26 leg can run ~2 hours while MacPorts' darwin_25/arm64 binary
  # archives lag behind: without a rust/cargo/uv archive, the py-uv-build
  # dependency chain compiles the Rust toolchain from source.
  macports-source:
    name: "✅ macports-source (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - macos-15-intel
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install MacPorts
        run: |
          MACOS_MAJOR="$(sw_vers -productVersion | cut -d . -f 1)"
          gh release download \
            --repo macports/macports-base \
            --pattern "MacPorts-*-${MACOS_MAJOR}-*.pkg" \
            --output macports.pkg
          sudo installer -pkg macports.pkg -target /
          echo "/opt/local/bin" >> "$GITHUB_PATH"
          echo "/opt/local/sbin" >> "$GITHUB_PATH"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Sync official ports tree
        run: sudo port -v sync
      - name: Register overlay ports tree
        run: |
          cp -R ./packaging/macports /Users/Shared/mpm-ports
          chmod -R a+rX /Users/Shared/mpm-ports
          portindex /Users/Shared/mpm-ports
          { echo "file:///Users/Shared/mpm-ports"; cat /opt/local/etc/macports/sources.conf; } > sources.conf
          sudo cp sources.conf /opt/local/etc/macports/sources.conf
      - name: Lint ports
        run: >
          port lint --nitpick
          meta-package-manager
          py-boltons
          py-click-extra
          py-cloup
          py-deepmerge
          py-extra-platforms
          py-packageurl-python
      - name: Install mpm
        run: sudo port -v install meta-package-manager
      - run: mpm --version

  # https://search.nixos.org/packages?query=meta-package-manager
  # https://github.com/NixOS/nixpkgs/blob/master/pkgs/by-name/me/meta-package-manager/package.nix
  # No macos-15-intel entry: nixpkgs 26.11 dropped x86_64-darwin support.
  nix:
    name: "⁉️ nix (${{ matrix.os }})"
    # Not yet accepted in nixpkgs.
    continue-on-error: true
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix-env --install --attr nixpkgs.meta-package-manager
      - run: mpm --version

  # https://github.com/kdeldycke/meta-package-manager/tree/main/packaging/nix
  # Install from the in-repo Nix definition, mirroring the documented build
  # instructions while NixOS/nixpkgs#506145 is pending review.
  # No macos-15-intel entry: nixpkgs 26.11 dropped x86_64-darwin support.
  nix-source:
    name: "✅ nix-source (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix-env --file ./packaging/nix --install
      - run: mpm --version

  # AUR builds from source with full test suites. Upstream PKGBUILD check()
  # failures in transitive dependencies (beartype, boltons, etc.) cause
  # cascading build errors that are not fixable from this project. See:
  # https://aur.archlinux.org/packages/meta-package-manager#comment-1065663
  # https://aur.archlinux.org/packages/python-boltons#comment-1065664
  # https://aur.archlinux.org/packages/python-beartype#comment-1065661
  # https://github.com/beartype/beartype/issues/631

  # https://aur.archlinux.org/packages/meta-package-manager
  # https://aur.archlinux.org/packages/meta-package-manager-bin
  aur:
    name: "⁉️ ${{ matrix.helper }}"
    # Container jobs require Docker, which ubuntu-slim does not provide.
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      matrix:
        include:
          - helper: pacaur
            image_tag: yay
          - helper: paru
            image_tag: paru
          - helper: yay
            image_tag: yay
    container:
      image: greyltc/archlinux-aur:${{ matrix.image_tag }}
    steps:
      - name: Refresh mirrors
        run: |
          pacman-key --init
          pacman --noconfirm -Syu
      - name: Install pacaur
        if: matrix.helper == 'pacaur'
        run: aur-install pacaur
      - run: runuser -u ab -- ${{ matrix.helper }} --noconfirm -S meta-package-manager
      - run: runuser -u ab -- ${{ matrix.helper }} --noconfirm -S meta-package-manager-bin
      - run: mpm --version

  # https://pip.pypa.io/en/stable/
  pip:
    name: "✅ pip (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
          - windows-11-arm
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install Python
        run: uv --no-progress venv --python 3.14
      - name: Run CLI via pip
        run: |
          pip install meta-package-manager
          mpm                  --version
          meta-package-manager --version

  # https://pipx.pypa.io/
  pipx:
    name: "✅ pipx (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
          - windows-11-arm
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install Python
        run: uv --no-progress venv --python 3.14
      - name: Run stable CLI via pipx
        run: |
          uv --no-progress tool install pipx
          pipx run                             meta-package-manager --version
          pipx run --spec meta-package-manager mpm                  --version
          pipx run --spec meta-package-manager meta-package-manager --version
          uv --no-progress tool uninstall pipx
      - name: Run dev CLI via pipx
        run: |
          uv --no-progress tool install pipx
          pipx run --spec git+https://github.com/kdeldycke/meta-package-manager mpm                  --version
          pipx run --spec git+https://github.com/kdeldycke/meta-package-manager meta-package-manager --version

  # https://scoop.sh/#/apps?q=meta-package-manager
  # https://github.com/ScoopInstaller/Main/blob/master/bucket/meta-package-manager.json
  scoop:
    name: "✅ scoop (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - windows-2025      # x86
          - windows-11-arm    # arm64
    runs-on: ${{ matrix.os }}
    steps:
      - shell: pwsh
        run: |
          iwr get.scoop.sh -outfile 'install.ps1'
          .\install.ps1 -RunAsAdmin
          # Force addition of Scoop shims to PATH for subsequent steps.
          "$env:USERPROFILE\scoop\shims" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
      - shell: pwsh
        run: scoop install main/meta-package-manager
      - shell: pwsh
        run: mpm --version

  # https://docs.astral.sh/uv/
  uv:
    name: "✅ uv (${{ matrix.os }})"
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-slim
          - macos-15-intel
          - macos-26
          - windows-11-arm
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install Python
        run: uv --no-progress venv --python 3.14
      - name: Run stable CLI
        run: |
          uvx           meta-package-manager                                --version
          uvx    --from meta-package-manager        -- mpm                  --version
          uv run --with meta-package-manager        -- mpm                  --version
          uv run --with meta-package-manager        -- meta-package-manager --version
          uv run --with meta-package-manager        -m meta_package_manager --version
          uv run --with meta-package-manager python -m meta_package_manager --version
      - name: Run stable CLI via uv tool
        run: |
          uv --no-progress tool install meta-package-manager
          mpm                  --version
          meta-package-manager --version
          uv --no-progress tool uninstall meta-package-manager
      - name: Run dev CLI
        run: |
          uvx    --from git+https://github.com/kdeldycke/meta-package-manager        -- mpm                  --version
          uvx    --from git+https://github.com/kdeldycke/meta-package-manager        -- meta-package-manager --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager        -- mpm                  --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager        -- meta-package-manager --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager        -m meta_package_manager --version
          uv run --with git+https://github.com/kdeldycke/meta-package-manager python -m meta_package_manager --version
      - name: Run dev CLI via uv tool
        run: |
          uv --no-progress tool install git+https://github.com/kdeldycke/meta-package-manager
          mpm                  --version
          meta-package-manager --version

  # https://github.com/lucasgelfond/zerobrew
  zerobrew:
    name: "✅ zerobrew (${{ matrix.os }}, ${{ matrix.asset }})"
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            asset: zb-linux-arm64
          - os: ubuntu-slim
            asset: zb-linux-x64
          - os: macos-15-intel
            asset: zb-darwin-x64
          - os: macos-26
            asset: zb-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install ZeroBrew
        run: >
          gh release download v0.3.0
          --repo lucasgelfond/zerobrew
          --pattern "${{ matrix.asset }}"
          --output /usr/local/bin/zb
          --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - run: chmod +x /usr/local/bin/zb
      - name: Initialize ZeroBrew
        run: |
          zb init
          {
            echo "$HOME/.zerobrew/bin"
            echo "$HOME/.local/share/zerobrew/prefix/bin"
            echo "/opt/zerobrew/bin"
          } >> "$GITHUB_PATH"
      - run: zb install meta-package-manager
      - run: mpm --version
