---
name: 🧊 Test yay cooldown
"on":
  workflow_dispatch:
  schedule:
    # Weekly: catch regressions from new yay releases or Arch/AUR changes that would
    # break the --cooldown init.lua overlay. The hermetic unit suite cannot cover this,
    # as it needs a real yay and the AUR.
    - cron: "29 7 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Drive a real Arch Linux + yay >= 13 to verify that mpm's --cooldown overlay
# (meta_package_manager.managers.pacman.Yay.cooldown_env / supports_cooldown) actually
# gates AUR installs by release age. yay is driven directly with the environment
# cooldown_env() produces, not through `mpm install`: mpm prefixes yay with sudo
# (correct for raw pacman) and yay refuses to build as root, so running yay as the
# unprivileged build user is the faithful way to exercise the AURPreInstall hook.
#
# Upstream context: https://github.com/Jguer/yay/issues/2883

jobs:

  # https://github.com/Jguer/yay/releases/latest
  yay-cooldown:
    name: "yay --cooldown on Arch Linux"
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Update system and install tooling
        run: >
          pacman --sync --refresh --sysupgrade --noconfirm --needed
          base-devel curl git nodejs python sudo uv

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write the integration test
        run: |
          cat > yay_cooldown_validate.py <<'PY'
          """Validate mpm's yay cooldown overlay end-to-end against a live yay.

          Covers two things the hermetic unit suite cannot:

          - the overlay survives garbage collection of the Yay instance (cleanup is
            registered with atexit, not weakref.finalize, because yay re-reads init.lua
            mid-run); the throwaway-manager + gc.collect() below guards that regression;
          - the release-age floor really blocks or admits an AUR install on real yay.
          """

          from __future__ import annotations

          import gc
          import os
          import subprocess
          from datetime import timedelta
          from pathlib import Path

          from meta_package_manager.managers.pacman import Yay

          pkg = os.environ["AUR_PACKAGE"]
          home = Path(os.environ["HOME"])

          # A user config the overlay must preserve: a sentinel-writing init.lua proves
          # the overlay chains it instead of shadowing it.
          user_yay = home / ".config" / "yay"
          user_yay.mkdir(parents=True, exist_ok=True)
          sentinel = user_yay / "chained.sentinel"
          (user_yay / "init.lua").write_text(
              'local f = io.open(os.getenv("HOME") .. "/.config/yay/chained.sentinel", "w")\n'
              'if f then f:write("loaded"); f:close() end\n',
              encoding="UTF-8",
          )
          (user_yay / "config.json").write_text("{}\n", encoding="UTF-8")


          def overlay_env(delta: timedelta) -> dict[str, str]:
              """Build via a throwaway manager dropped on return (the GC scenario)."""
              manager = Yay()
              manager.cooldown = delta
              assert manager.supports_cooldown, "real yay must advertise cooldown support"
              return {**os.environ, **manager.cooldown_env()}


          def installed(name: str) -> bool:
              return subprocess.run(["pacman", "--query", name]).returncode == 0


          def reset_cold() -> None:
              for p in ("downgrade", "fzf", "pacman-contrib"):
                  if installed(p):
                      subprocess.run(
                          ["sudo", "pacman", "--remove", "--nosave", "--noconfirm", p]
                      )
              subprocess.run(["rm", "-rf", str(home / ".cache" / "yay")])


          # downgrade-style leaf packages are last-modified well within a year, so a
          # 365-day floor holds them back while a 1-second floor lets them through.
          cases = [
              ("365-day cooldown (realistic floor)", timedelta(days=365), True),
              ("40000-day cooldown (epoch clamped to 0)", timedelta(days=40000), True),
              ("1-second cooldown (no real floor)", timedelta(seconds=1), False),
          ]

          first = True
          for label, delta, expect_blocked in cases:
              want = "BLOCKED" if expect_blocked else "ALLOWED"
              print(f"\n=== {label}: expect {want} ===", flush=True)
              reset_cold()
              sentinel.unlink(missing_ok=True)
              env = overlay_env(delta)
              gc.collect()  # drop the throwaway manager; the overlay must survive.
              init_lua = Path(env["XDG_CONFIG_HOME"]) / "yay" / "init.lua"
              assert init_lua.exists(), "overlay was deleted before yay ran"
              print(f"  injected epoch: {env['MPM_COOLDOWN_EPOCH']}", flush=True)
              subprocess.run(
                  ["yay", "--sync", "--noconfirm", pkg], env=env, text=True
              )
              if first:
                  assert sentinel.exists(), "overlay did not chain the user's init.lua"
                  first = False
              blocked = not installed(pkg)
              print(f"{label}: blocked={blocked} (expected {expect_blocked})", flush=True)
              assert blocked == expect_blocked, (
                  f"{label}: expected blocked={expect_blocked}, got {blocked}"
              )

          reset_cold()
          print("\nALL LIVE CHECKS PASSED", flush=True)
          PY

      - name: Create an unprivileged build user
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown --recursive builder:builder .

      # Track the latest yay release so this guard catches regressions from new yay
      # versions. Installed from GitHub releases (reliable host; the AUR git endpoint
      # flakes intermittently). The API lookup authenticates with GITHUB_TOKEN to avoid
      # the anonymous shared-IP rate limit; raw curl, as the Arch container has no gh.
      - name: Install the latest yay from GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(curl --fail --silent --show-error --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/Jguer/yay/releases/latest \
            | python -c 'import json, sys; print(json.load(sys.stdin)["tag_name"])')"
          version="${tag#v}"
          curl --fail --silent --show-error --location \
            "https://github.com/Jguer/yay/releases/download/${tag}/yay_${version}_x86_64.tar.gz" \
            --output /tmp/yay.tar.gz
          tar --extract --gzip --file /tmp/yay.tar.gz --directory /tmp
          install -Dm755 "/tmp/yay_${version}_x86_64/yay" /usr/bin/yay

      - name: Report yay version
        run: sudo --set-home --user builder yay --version

      - name: Validate the cooldown overlay against real yay
        env:
          AUR_PACKAGE: downgrade
        run: >
          sudo --set-home --user builder --preserve-env=AUR_PACKAGE
          uv run --frozen python yay_cooldown_validate.py
