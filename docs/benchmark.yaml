refused:
  # Each entry records a manager the competitor explicitly declined to
  # implement, keyed by manager-id then by competitor, with the value being
  # the URL of the refusal (issue closed as NOT_PLANNED, maintainer comment,
  # rejected PR). Procedural closures (like "please reopen using the correct
  # template" that never got a followup) count as refusals here too: the
  # request was made, the issue was closed, no support followed. Keys and
  # nested keys are sorted alphabetically.
  cabal:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/320
  opencode:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/1688
  yt-dlp:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/1764
  zerobrew:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/2003
