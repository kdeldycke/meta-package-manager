# Per-manager competitor support flags and homepage URLs for the benchmark
# page.
#
# This file encodes which managers each *competing* tool supports. The mpm
# column on the page is auto-derived from the live pool of supported managers
# (see ``meta_package_manager/pool.py``). When adding a new manager to mpm,
# its row appears automatically: only competitor data needs to be tracked
# here.
#
# Schema:
#
#   managers:
#     <manager-id>: [<competitor>, ...]
#
#   homepages:
#     <manager-id>: <https-url>
#
# ``managers`` keys must be lower-case manager identifiers. Each value is a
# list (possibly empty) of competing tools that support that manager, chosen
# from: topgrade, pacaptr.
#
# ``homepages`` only needs to contain URLs for managers that mpm does not
# implement. For mpm-implemented managers the homepage is sourced from the
# class's ``homepage_url`` attribute. Cross-tool naming differences are
# resolved by using mpm's identifier as the canonical row key: a flag means
# "this competitor supports the manager identified by this row", even if the
# competitor internally calls it something else (like topgrade's
# ``brew_formula`` for our ``brew``).
#
# ``coarse_support`` is a second mapping with the same shape as ``managers``.
# Entries record ``(manager_id, competitor)`` pairs where the competitor can
# only upgrade the manager as part of a coarser umbrella step, never in
# isolation. Topgrade's ``Step::Shell`` and ``Step::Vim`` are the canonical
# examples: ``--only shell`` runs *every* zsh/bash/fish plugin manager the
# host has installed, so asking topgrade to upgrade just ``antibody`` (or
# just ``vundle``) is impossible. Cells in the support table render as
# ``≈[^coarse]`` instead of ``✓`` for these pairs. Every coarse entry must
# also exist in ``managers`` (you cannot be coarse-only-supported without
# being supported at all).
#
# ``refused`` records ``(manager_id, competitor, evidence_url)`` triples where
# the competitor has *explicitly declined* to support the manager, with a
# link to the specific issue, PR, or comment carrying the refusal. Cells in
# the support table render as ``[❌](url)`` for these pairs, letting readers
# audit each claim against the upstream decision. The evidence link must
# point to a concrete refusal (a maintainer comment, a ``NOT_PLANNED``
# closure, a rejected PR), not a generic repo homepage: absence of support
# without a documented decision stays a blank cell. A ``(manager_id,
# competitor)`` pair cannot appear in both ``managers`` and ``refused`` for
# the same competitor.

