# Per-manager competitor support flags for the benchmark page.
#
# This file encodes which managers each *competing* tool supports.
# The mpm column on the page is auto-derived from the live pool of
# supported managers (see meta_package_manager/pool.py). When adding
# a new manager to mpm, its row appears automatically; only competitor
# data needs to be tracked here.
#
# Keys must be lower-case manager identifiers. Each value is a list
# (possibly empty) of competing tools that support that manager,
# chosen from: topgrade, pacaptr, pacapt, sysget, whohas.

managers:
  0install: []
  antibody: [topgrade]
  antigen: [topgrade]
  apk: [pacaptr, pacapt]
