coarse_support:
  # Two clusters share this map, both topgrade-driven:
  #   - Zsh/Bash/Fish plugin managers under `Step::Shell` (`antibody`,
  #     `antidote`, `antigen`, `bash-it`, `fish-plug`, `fisher`, `fundle`,
  #     `oh-my-bash`, `oh-my-fish`, `oh-my-zsh`, `zgenom`, `zim`, `zinit`,
  #     `zplug`, `zr`). `topgrade --only shell` runs all of them.
  #   - Vim/Neovim plugin managers under `Step::Vim` (`dein`, `lazy`,
  #     `mason`, `neobundle`, `packer-nvim`, `paq`, `plug`, `voom`,
  #     `vundle`). `topgrade --only vim` runs all of them.
  # Keys are sorted alphabetically rather than grouped by cluster so the
  # well-formedness test stays simple. Values are `{competitor: url}` maps
  # linking to the maintainer's own confirmation of the coarse bundling
  # (like the `Step::Shell` / `Step::Vim` acknowledgement in topgrade
  # discussion #961). Cells render as `[🟡](url)`.
  antibody:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  antidote:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  antigen:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  bash-it:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  dein:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  fish-plug:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  fisher:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  fundle:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  lazy:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  mason:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  neobundle:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
  oh-my-bash:
    topgrade: https://github.com/topgrade-rs/topgrade/issues/961#issuecomment-2420924279
