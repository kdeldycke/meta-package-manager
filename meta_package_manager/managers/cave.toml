# Bundled package-manager definition shipped with mpm.
#
# cave is the client of Paludis, Exherbo's package mangler (https://exherbo.org,
# https://paludis.exherbo.org). See docs/overrides.md ("Define a new manager") for
# the schema and meta_package_manager/definitions.py (build_bundled_managers) for the
# loader.
#
# Parsing notes, verified against the cave man pages (paludis.exherbo.org/clients/):
#   - `print-ids` is the only machine-parseable listing ("No formatting is used,
#     making the output suitable for parsing by scripts"), with a caller-controlled
#     `--format`; the '*/*::installed' spec selects the installed repository.
#   - No `search`: `cave search` emits multi-line human records with no format
#     control, and `print-ids --matching` needs an exact spec rather than a fuzzy
#     query. No `outdated` either: the `cave resolve` plan is human-oriented.
#   - `resolve` never prompts (it refuses risky transactions instead, wanting
#     explicit `--permit-*` flags), so no assume-yes flag exists or is needed.
#   - Execute phases (`--execute`) and sync need root; plan-only and print-ids calls
#     do not.

[mpm.managers.cave]
name = "cave"
homepage_url = "https://exherbo.org"
platforms = ["exherbo"]
cli_names = ["cave"]
# Global flag, placed before the subcommand: disables color on every call.
pre_args = ["--colour", "no"]
default_sudo = true
# `cave --version` reports a bare semver, currently in the 3.0.x series.
version_regexes = ['(?P<version>\d+\.\d+\.\d+)']

# The format string is interpreted by cave itself (%c category, %p package,
# %v version, \n newline): single-quoted TOML keeps the backslash literal.
[mpm.managers.cave.operations.installed]
args = ["print-ids", "--matching", "*/*::installed", "--format", '%c/%p %v\n']
regex = '^(?P<package_id>\S+) (?P<installed_version>\S+)$'

# `purge` without `--execute` displays the resolution without acting (Paludis
# refuses to act unless --execute is given), listing each would-be uninstall as a
# `<   category/name-version:slot::repo` line of the plan.
[mpm.managers.cave.operations.orphans]
args = ["purge"]
regex = '^<\s+(?P<package_id>[^\s:]+)-(?P<installed_version>\d[^\s:]*):'

[mpm.managers.cave.operations.install]
args = ["resolve", "--execute", "{package_id}"]
sudo = true

# `cave uninstall foo` is documented as the same as `cave resolve !foo`; dependents
# may require explicit --permit-uninstall flags, which mpm does not pass.
[mpm.managers.cave.operations.remove]
args = ["uninstall", "--execute", "{package_id}"]
sudo = true

# Resolving a package installs its best available version, upgrading in place.
[mpm.managers.cave.operations.upgrade_one]
args = ["resolve", "--execute", "{package_id}"]
sudo = true

# Resolving the world set with --complete ("do all optional work... often used when
# updating 'world'") is the documented whole-system upgrade.
[mpm.managers.cave.operations.upgrade_all]
args = ["resolve", "--complete", "world", "--execute"]
sudo = true

[mpm.managers.cave.operations.sync]
args = ["sync"]
sudo = true

# Uninstalls any package that is neither in 'world' nor a dependency of it: cave's
# whole cleanup is an orphan sweep, declared as such.
[mpm.managers.cave.operations.cleanup_orphan]
args = ["purge", "--execute"]
sudo = true

# Output samples locking the version probe and the declared parsers, derived
# from the upstream tool's own source code or documentation. Consumed by
# tests/test_manager_definition.py; ignored by mpm's loader.
[samples.version]
output = "cave 3.0.1"
expected = "3.0.1"

[[samples.installed]]
output = """
app-arch/gzip 1.14
sys-apps/sed 4.9"""
packages = [
  { id = "app-arch/gzip", version = "1.14" },
  { id = "sys-apps/sed", version = "4.9" },
]

[[samples.orphans]]
output = """
Done: 156 metadata, 42 steps

These are the actions I will take, in order:

<   dev-libs/libpcre-8.45:0::installed
    Reasons: purge

<   app-misc/tmux-3.3a:0::installed
    Reasons: purge

Total: 2 uninstalls

Use --execute to perform the actions I described."""
packages = [
  { id = "dev-libs/libpcre", version = "8.45" },
  { id = "app-misc/tmux", version = "3.3a" },
]
