# Bundled package-manager definition shipped with mpm.
#
# The cpan client of the Comprehensive Perl Archive Network (https://www.cpan.org).
# See docs/overrides.md ("Define a new manager") for the schema and
# meta_package_manager/definitions.py (build_bundled_managers) for the loader.
#
# The tracked version is CPAN.pm's library version, not the cpan script version
# printed on the same line.
#
# Installs may require sudo when using the system Perl; local::lib gives user-local
# installs instead. The write operations carry dormant privileged markers: `--sudo`
# or a `sudo = true` override escalates them, while nothing escalates by default.
# cpan cannot uninstall a module, so no remove operation is declared.

[mpm.managers.cpan]
name = "Perl CPAN"
homepage_url = "https://www.cpan.org"
platforms = ["all_platforms"]
requirement = ">=1.64"
# PERL_MM_USE_DEFAULT suppresses the interactive configuration cpan may launch on
# first run.
extra_env = { PERL_MM_USE_DEFAULT = "1" }
# `cpan -v` prints ">(info): /usr/bin/cpan script version 1.676, CPAN.pm version
# 2.28"; the CPAN.pm version is the meaningful one.
version_cli_options = ["-v"]
version_regexes = ['CPAN\.pm\s+version\s+(?P<version>\S+)']

# `cpan -l` prints tab-separated "Module<TAB>version" rows. Modules with no
# installed version report the literal "undef", which the alternation deliberately
# keeps out of the version group so the package is yielded version-less.
[mpm.managers.cpan.operations.installed]
args = ["-l"]
regex = '^(?P<package_id>\S+)\t(?:undef|(?P<installed_version>\S+))$'

# `cpan -O` prints "Module  local  latest" columns. Only true three-column rows
# match: the loader banner, "Reading ..." line, indented "Database was generated"
# line, column header and dashed separator all fail the anchored three-token shape.
[mpm.managers.cpan.operations.outdated]
args = ["-O"]
regex = '^(?P<package_id>\S+)\s+(?P<installed_version>\S+)\s+(?P<latest_version>\S+)$'

# A bare module name installs it.
[mpm.managers.cpan.operations.install]
args = ["{package_id}"]
sudo = true

[mpm.managers.cpan.operations.upgrade_one]
args = ["-i", "{package_id}"]
sudo = true

[mpm.managers.cpan.operations.upgrade_all]
args = ["-u"]
sudo = true

# Output samples locking the version probe and the declared parsers, derived
# from the upstream tool's own source code or documentation. Consumed by
# tests/test_manager_definition.py; ignored by mpm's loader.
[samples.version]
output = ">(info): /usr/bin/cpan script version 1.676, CPAN.pm version 2.28"
expected = "2.28"

[[samples.installed]]
output = """
Loading internal logger. Log::Log4perl recommended for better logging
O\t1.03
Errno\t1.33
Encode\t3.08_01
meta_notation\tundef"""
packages = [
  { id = "O", version = "1.03" },
  { id = "Errno", version = "1.33" },
  { id = "Encode", version = "3.08_01" },
  { id = "meta_notation" },
]

[[samples.outdated]]
output = """
Loading internal logger. Log::Log4perl recommended for better logging
Reading '/Users/kde/.cpan/Metadata'
  Database was generated on Thu, 26 Mar 2026 13:41:03 GMT
Module Name                                Local    CPAN
---------------------------------------------------------------
Algorithm::C3                             0.1000  0.1100
Archive::Tar                              2.3800  3.0400"""
packages = [
  { id = "Algorithm::C3", version = "0.1100" },
  { id = "Archive::Tar", version = "3.0400" },
]
