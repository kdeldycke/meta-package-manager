# Bundled package-manager definition shipped with mpm.
#
# Fink (https://www.finkproject.org) brings Debian tools (dpkg, apt) to macOS,
# compiling or installing packages under its own prefix. See docs/overrides.md
# ("Define a new manager") for the schema and meta_package_manager/definitions.py
# (build_bundled_managers) for the loader.
#
# Parsing notes, verified against the fink Perl source (Fink/Engine.pm, Fink/CLI.pm,
# Fink/Config.pm) and its man page:
#   - `fink list --tab` prints one `status<TAB>name<TAB>version<TAB>description`
#     record per line, no header or footer. The 3-char status is " i " (installed,
#     current), "(i)" (installed, newer exists), "*i*" (newer than fink knows),
#     " p " (virtual, empty version) or "   " (not installed).
#   - No `outdated`: the version column's semantics on "(i)" rows (installed vs
#     latest) is not pinned down by the docs, so no upgradable listing is declared
#     rather than risking mislabeled versions. `upgrade --all` works without it.
#   - fink self-escalates: root commands re-exec through /usr/bin/sudo (RootMethod
#     defaults to sudo) and no-op when already root. mpm must therefore NOT mark
#     operations sudo itself; unattended runs need a cached or NOPASSWD sudo
#     ticket since fink's own sudo prompt targets the controlling terminal.
#   - The global `--yes` flag precedes the command word and auto-answers fink's own
#     prompts.

[mpm.managers.fink]
name = "Fink"
homepage_url = "https://www.finkproject.org"
platforms = ["macos"]
cli_names = ["fink"]
# fink self-escalates through /usr/bin/sudo: see the parsing notes above.
internal_sudo = true
# Only the first line of `fink --version` is stable: "Package manager version:
# 0.45.6". The distribution and copyright lines below it vary.
version_regexes = ['Package manager version: (?P<version>\S+)']

[mpm.managers.fink.operations.installed]
args = ["list", "--tab", "--installed"]
regex = '^(?: i |\(i\)|\*i\*)\t(?P<package_id>[^\t]+)\t(?P<installed_version>[^\t]+)\t'

# `fink list <pattern>` matches package names only (the pattern is anchored and
# glob-style); any status column is accepted, including not-installed spaces, and
# virtual packages carry an empty version which the parser then omits.
[mpm.managers.fink.operations.search]
args = ["list", "--tab", "{query}"]
regex = '^[^\t]*\t(?P<package_id>[^\t]+)\t(?P<latest_version>[^\t]*)\t'

[mpm.managers.fink.operations.install]
args = ["--yes", "install", "{package_id}"]

[mpm.managers.fink.operations.remove]
args = ["--yes", "remove", "{package_id}"]

# `update` is install's resolve-to-latest alias for single packages.
[mpm.managers.fink.operations.upgrade_one]
args = ["--yes", "update", "{package_id}"]

[mpm.managers.fink.operations.upgrade_all]
args = ["--yes", "update-all"]

# Refreshes the local package descriptions from the remote (the apt-update
# analogue). May be slow: fink fetches through git/rsync/cvs.
[mpm.managers.fink.operations.sync]
args = ["--yes", "selfupdate"]

# Default scope purges obsolete .deb archives and source tarballs.
[mpm.managers.fink.operations.cleanup_cache]
args = ["--yes", "cleanup"]

# Output samples locking the version probe and the declared parsers, derived
# from the upstream tool's own source code or documentation. Consumed by
# tests/test_manager_definition.py; ignored by mpm's loader.
[samples.version]
output = "Package manager version: 0.45.6"
expected = "0.45.6"

[[samples.installed]]
output = """
 i \tfiglet\t2.2.5-1\tPrints text as ASCII art
(i)\tnano\t6.2-1\tSmall editor
   \tlynx\t2.9.0-1\tText browser is not installed"""
packages = [
  { id = "figlet", version = "2.2.5-1" },
  { id = "nano", version = "6.2-1" },
]
