# Bundled package-manager definition shipped with mpm.
#
# This is a real, 100%-config-defined manager: mpm loads it from this file at startup
# through the very same schema and parser a user's own `[mpm.managers.<id>]` section
# goes through, dogfooding the configuration-defined-manager feature on a genuine
# cross-platform CLI. See docs/overrides.md ("Define a new manager") for the schema,
# and meta_package_manager/definitions.py (build_bundled_managers) for the loader.

[mpm.managers.gh-ext]
name = "GitHub CLI extensions"
homepage_url = "https://cli.github.com"
# "linux_like" covers every Linux distribution plus WSL, matching gh's Linux binary.
platforms = ["linux_like", "macos", "windows"]
cli_names = ["gh"]
# The `gh extension` command surface has been stable since the gh 2.x line.
requirement = ">=2.0.0"
# `gh --version` prints e.g. "gh version 2.62.0 (2024-11-14)"; the trailing date is ignored.
version_regexes = ['gh version\s+(?P<version>\d+\.\d+\.\d+)']

# Piped (non-TTY) `gh extension list` is tab-separated, untruncated, uncolored and
# headerless. Column 1 is the literal "gh <name>" invocation, column 2 the "owner/repo"
# slug, column 3 the free-form version (a semver tag or an 8-char commit SHA), so
# installed_version is captured opaquely. The slug is the package id: it is the one
# identifier every operation accepts (see the install comment below), so installed ids
# round-trip through remove/upgrade and backup/restore.
[mpm.managers.gh-ext.operations.installed]
args = ["extension", "list"]
regex = '^gh \S+\t(?P<package_id>\S+/\S+)\t(?P<installed_version>\S+)'

# `gh extension search` prints tab-separated rows: an install-state column (empty, or
# "installed"), the "owner/repo" slug, then a description. run_cli strips the captured
# output, so the first row loses its leading empty-state tab and its slug shifts to
# column 1; match the slug by content (the only field holding a "/"), not by column.
[mpm.managers.gh-ext.operations.search]
args = ["extension", "search", "{query}"]
regex = '(?P<package_id>\S+/\S+)'

# Every operation takes the "owner/repo" slug: install requires it, while remove and
# upgrade normalize it down to the short name gh derives from it ("dlvhdr/gh-dash" is
# extension "dash"). Keying packages on the slug is thus the only scheme under which
# the ids reported by `installed` above feed back into every other operation.
[mpm.managers.gh-ext.operations.install]
args = ["extension", "install", "{package_id}"]

[mpm.managers.gh-ext.operations.remove]
args = ["extension", "remove", "{package_id}"]

[mpm.managers.gh-ext.operations.upgrade_one]
args = ["extension", "upgrade", "{package_id}"]

[mpm.managers.gh-ext.operations.upgrade_all]
args = ["extension", "upgrade", "--all"]

# No `outdated`: `gh extension list` has no update-available column and gh offers no
# non-mutating "list upgradable" command, so mpm auto-skips outdated for this manager.

# Output samples locking the version probe and the declared parsers, derived
# from the upstream tool's own source code or documentation. Consumed by
# tests/test_manager_definition.py; ignored by mpm's loader.
[samples.version]
output = "gh version 2.62.0 (2024-11-14)"
expected = "2.62.0"

# Covers both version shapes of column 3: a semver tag and an 8-char commit SHA.
[[samples.installed]]
output = """
gh dash\tdlvhdr/gh-dash\tv4.7.0
gh cockpit\tgithub/gh-cockpit\ta1b2c3d4"""
packages = [
  { id = "dlvhdr/gh-dash", version = "v4.7.0" },
  { id = "github/gh-cockpit", version = "a1b2c3d4" },
]

# Covers all three row shapes: the first row whose leading empty-state tab
# run_cli strips off (slug in column 1), a row with an empty install-state
# column (slug in column 2), and a row whose install-state column is populated.
[[samples.search]]
output = """
dlvhdr/gh-dash\tA rich terminal UI for GitHub
\tvilmibm/gh-screensaver\tScreensavers for your terminal
installed\tcli/gh-webhook\tForward webhooks to localhost"""
packages = [
  { id = "dlvhdr/gh-dash" },
  { id = "vilmibm/gh-screensaver" },
  { id = "cli/gh-webhook" },
]
