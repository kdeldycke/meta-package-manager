# Bundled package-manager definition shipped with mpm.
#
# soar (https://github.com/pkgforge/soar) is a fast package manager for portable Linux
# binaries and AppImages. See docs/overrides.md ("Define a new manager") for the schema
# and meta_package_manager/definitions.py (build_bundled_managers) for the loader.
#
# soar is pre-1.0 and makes no cross-minor compatibility promise, so the `>=0.12.0`
# floor tracks the 0.12 CLI surface parsed below (`list-installed`, `search`, `-y`,
# `--no-color`) rather than an older release.
#
# Parsing notes, verified against the soar-cli 0.12.6 source:
#   - `soar --json` emits newline-delimited log records, not one JSON array, so the DSL's
#     flat-JSON parser cannot consume it; the readable text output is parsed instead.
#   - `--no-color` (a global flag; soar does NOT honor NO_COLOR) strips ANSI so the line
#     regexes see clean text.
#   - `install` and `remove` block on an interactive prompt unless `-y` is passed, which
#     would hang mpm's non-interactive subprocess.
#   - No `outdated`: soar has no non-mutating "list upgradable" command, so mpm
#     auto-skips that operation.

[mpm.managers.soar]
name = "Soar"
homepage_url = "https://github.com/pkgforge/soar"
# soar is Linux-only (it relies on landlock and other Linux syscalls); "linux_like" also
# covers WSL.
platforms = ["linux_like"]
cli_names = ["soar"]
# 0.12 is the CLI surface parsed below (list-installed, search, -y, --no-color). soar is
# pre-1.0 and makes no cross-minor compatibility promise, so the floor tracks that line.
requirement = ">=0.12.0"
# Strip ANSI from every call so the query regexes see clean text.
pre_args = ["--no-color"]
# `soar --version` prints "soar 0.12.6". Nightly builds print "soar nightly-<sha>", which
# intentionally fails this release-version match.
version_regexes = ['soar\s+(?P<version>\d+\.\d+\.\d+)']

# `soar list-installed` prints one "name-version:repo (date) (size)[ status]" per line.
# The name/version split is the last "-" before a digit-led version, ahead of the ":"
# that separates the repo. A trailing summary block matches nothing and is skipped.
[mpm.managers.soar.operations.installed]
args = ["list-installed"]
regex = '^(?P<package_id>.+)-(?P<installed_version>\d[^:]*):'

# `soar search <query>` prints "[icon] name#pkg_id:repo | version | type - desc (size)".
# The package id is the name before "#"; matching only that keeps parsing robust against
# the richer trailing columns.
[mpm.managers.soar.operations.search]
args = ["search", "{query}"]
regex = '^\[.\] (?P<package_id>[^#\s]+)#'

# install and remove need -y, or they block on an interactive selection prompt.
[mpm.managers.soar.operations.install]
args = ["install", "-y", "{package_id}"]

[mpm.managers.soar.operations.remove]
args = ["remove", "-y", "{package_id}"]

[mpm.managers.soar.operations.upgrade_one]
args = ["update", "{package_id}"]

[mpm.managers.soar.operations.upgrade_all]
args = ["update"]

[mpm.managers.soar.operations.sync]
args = ["sync"]

[mpm.managers.soar.operations.cleanup]
args = ["clean", "--cache"]

# No `outdated`: soar has no non-mutating "list upgradable" command, so mpm auto-skips it.

# Output samples locking the version probe and the declared parsers, derived
# from the upstream tool's own source code or documentation. Consumed by
# tests/test_manager_definition.py; ignored by mpm's loader.
[samples.version]
output = "soar 0.12.6"
expected = "0.12.6"

# Splits "name-version:repo" at the last "-" before a digit-led version, so
# multi-hyphen names stay intact.
[[samples.installed]]
output = """
bat-0.24.0:soarpkgs (2025-01-15) (1.8 MB)
google-chrome-131.0:soarpkgs (2025-01-14) (95.2 MB)
7-zip-24.09:soarpkgs (2025-01-10) (1.5 MB) [Broken]"""
packages = [
  { id = "bat", version = "0.24.0" },
  { id = "google-chrome", version = "131.0" },
  { id = "7-zip", version = "24.09" },
]

# Extracts the package name (before "#") from each line, tolerating both the
# installed (✓/+) and available (○/-) state icons.
[[samples.search]]
output = """
[+] bat#official:soarpkgs | 0.24.0 | archive - A cat clone (1.8 MB)
[✓] ripgrep#official:soarpkgs | 14.1.0 | archive - Fast search (4.2 MB)"""
packages = [
  { id = "bat" },
  { id = "ripgrep" },
]
