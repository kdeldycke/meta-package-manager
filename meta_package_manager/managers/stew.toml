# Bundled package-manager definition shipped with mpm.
#
# Stew (https://github.com/marwanhawari/stew) installs pre-compiled binaries from
# GitHub Releases. See docs/overrides.md ("Define a new manager") for the schema and
# meta_package_manager/definitions.py (build_bundled_managers) for the loader.
#
# Parsing notes:
#   - `stew search` launches an interactive terminal UI and cannot be used
#     programmatically, so no search operation is declared.
#   - Stew identifies packages by binary name for upgrade and uninstall, but uses
#     the owner/repo format for install.
#   - `stew list --tags` mixes two line shapes: GitHub-sourced packages
#     ("binary:owner/repo@tag", whose tag is the version, cosmetic "v" prefix
#     stripped) and URL-sourced packages ("binary:url", carrying no version). The
#     installed regex alternation covers both, keeping the version group out of the
#     URL branch so those packages are yielded version-less.

[mpm.managers.stew]
name = "stew"
homepage_url = "https://github.com/marwanhawari/stew"
platforms = ["linux_like", "macos", "all_windows"]
requirement = ">=0.3.0"
# `stew --version` prints "stew version v0.6.0".
version_regexes = ['stew version v(?P<version>\S+)']

[mpm.managers.stew.operations.installed]
args = ["list", "--tags"]
regex = '^(?P<package_id>\S+?):(?:\S+?/\S+?@v?(?P<installed_version>\S+)|\S+)$'

[mpm.managers.stew.operations.install]
args = ["install", "{package_id}"]

[mpm.managers.stew.operations.remove]
args = ["uninstall", "{package_id}"]

[mpm.managers.stew.operations.upgrade_one]
args = ["upgrade", "{package_id}"]

[mpm.managers.stew.operations.upgrade_all]
args = ["upgrade", "--all"]

# Output samples locking the version probe and the declared parsers, derived
# from the upstream tool's own source code or documentation. Consumed by
# tests/test_manager_definition.py; ignored by mpm's loader.
[samples.version]
output = "stew version v0.6.0"
expected = "0.6.0"

[[samples.installed]]
output = """
gh:cli/cli@v2.4.0
fzf:junegunn/fzf@0.29.0
hyperfine:https://github.com/sharkdp/hyperfine/releases/download/v1.12.0/hyperfine-v1.12.0-x86_64-apple-darwin.tar.gz
rg:BurntSushi/ripgrep@13.0.0"""
packages = [
  { id = "gh", version = "2.4.0" },
  { id = "fzf", version = "0.29.0" },
  { id = "hyperfine" },
  { id = "rg", version = "13.0.0" },
]
