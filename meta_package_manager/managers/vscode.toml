# Bundled package-manager definition shipped with mpm.
#
# Visual Studio Code's extension manager (https://code.visualstudio.com), driven
# through the `code` CLI. See docs/overrides.md ("Define a new manager") for the
# schema and meta_package_manager/definitions.py (build_bundled_managers) for the
# loader.
#
# The Marketplace cannot be queried from the CLI: no search, outdated or upgrade
# command exists (extensions self-update in the background), so only the installed
# listing, install and remove are declared.
#
# No version_regexes: `code --version` prints the bare version, then the commit
# hash and the arch on their own lines, and the default regex picks the first
# token up.

[mpm.managers.vscode]
name = "Visual Studio Code"
homepage_url = "https://code.visualstudio.com"
platforms = ["all_platforms"]
cli_names = ["code"]
requirement = ">=1.60.0"
# Brewfile's DSL has a first-class `vscode` entry type, so `mpm dump --brewfile`
# exports extensions installed through this manager.
brewfile_entry_type = "vscode"

# `code --list-extensions --show-versions` prints "publisher.extension@version"
# rows.
[mpm.managers.vscode.operations.installed]
args = ["--list-extensions", "--show-versions"]
regex = '^(?P<package_id>[^@\s]+)@(?P<installed_version>\S+)$'

[mpm.managers.vscode.operations.install]
args = ["--install-extension", "{package_id}"]

[mpm.managers.vscode.operations.remove]
args = ["--uninstall-extension", "{package_id}"]

# Output samples locking the version probe and the declared parsers, derived
# from the upstream tool's own source code or documentation. Consumed by
# tests/test_manager_definition.py; ignored by mpm's loader.
# vscode and vscodium declare no version_regexes: `code --version` prints the
# bare version, then the commit hash and arch on their own lines, and the
# default probe regex picks the first token up.
[samples.version]
output = """
1.60.2
7f6ab5485bbc008386c4386d08766667e155244e
x64"""
expected = "1.60.2"

[[samples.installed]]
output = """
ms-python.python@2021.9.1246542782
ms-toolsai.jupyter@2021.8.2041215044
tamasfe.even-better-toml@0.14.2"""
packages = [
  { id = "ms-python.python", version = "2021.9.1246542782" },
  { id = "ms-toolsai.jupyter", version = "2021.8.2041215044" },
  { id = "tamasfe.even-better-toml", version = "0.14.2" },
]
