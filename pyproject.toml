[build-system]
build-backend = "uv_build"
requires = [ "uv-build>=0.9" ]

[project]
# Docs: https://packaging.python.org/en/latest/guides/writing-pyproject-toml/
name = "meta-package-manager"
version = "7.3.0.dev0"
description = "🎁 wraps all package managers with a unifying CLI"
readme = "readme.md"
keywords = [
  "alpine linux",
  "anaconda",
  "apk",
  "apm",
  "appimage",
  "apt",
  "apt-cyg",
  "apt-mint",
  "asdf",
  "atom",
  "brew",
  "cargo",
  "cask",
  "cave",
  "choco",
  "chocolatey",
  "chromebrew",
  "chromeos",
  "clear linux",
  "CLI",
  "cli-tools",
  "composer",
  "conda",
  "cpan",
  "cyclonedx",
  "cygwin",
  "deb-get",
  "dnf",
  "dnf5",
  "emerge",
  "eopkg",
  "exherbo",
  "fink",
  "flatpak",
  "fwupd",
  "gem",
  "gh-ext",
  "github cli",
  "gnu guix",
  "guix",
  "homebrew",
  "mac app store",
  "macos",
  "macports",
  "mageia",
  "mas",
  "meta-package-manager",
  "mise",
  "netbsd",
  "nix",
  "nixpkgs",
  "node",
  "npm",
  "openbsd",
  "opkg",
  "pacaur",
  "package",
  "package manager",
  "package url",
  "package-manager-cli",
  "packagekit",
  "pacman",
  "pacstall",
  "paludis",
  "paru",
  "php composer",
  "pip",
  "pipx",
  "pkcon",
  "pkg",
  "pkg-tools",
  "pkgin",
  "pkgsrc",
  "plugin",
  "pnpm",
  "portage",
  "ports",
  "powershell",
  "powershell-gallery",
  "psresourceget",
  "purl",
  "pwsh",
  "pwsh-gallery",
  "ruby",
  "ruby-gem",
  "rust",
