[tool.gitleaks]
allowlist.description = "False positives"
allowlist.commits = [
  # Old Travis CI HOMEBREW_GITHUB_API_TOKEN (revoked).
  "ee7613d49366694877177d82e207e870afb3cc1f",
  # Example brew cask output containing API_KEY="abcdef123456".
  "745247e5c74122de9ec2dd95cbd3b8510fe224d5",
  "e31111be719406940519f52c9d4406e97fb368a3",
]

[tool.click-extra]
# Declarative CLI test suite for binary testing. Repomatic's test and release
# workflows run `click-extra test-suite` against the built binary; that engine
# (the `test-plan` engine, renamed and moved upstream into click-extra 8.1)
# resolves its cases from this section. Without it, click-extra looks for its
# default `./tests/cli-test-suite.toml`, finds nothing, and silently falls back
# to a trivial built-in suite, so the binary self-test must point here explicitly.
#
# The plan is TOML, not YAML: the binary self-test runs `click-extra test-suite`
# through a bare `uv run --frozen` (base dependencies only), and click-extra 8.1
# reads TOML via the standard-library `tomllib` with no format extra. YAML and the
# other formats need their `click-extra[<fmt>]` extra, which the bare runner lacks,
# so a YAML plan raises "YAML support disabled" before any case runs.
test-suite.file = "./tests/cli-test-plan.toml"
