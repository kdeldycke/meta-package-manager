authors = [ { name = "Kevin Deldycke", email = "kevin@deldycke.com" } ]
# Python versions and their status: https://devguide.python.org/versions/
requires-python = ">=3.10"
classifiers = [
  # See: https://pypi.org/pypi?%3Aaction=list_classifiers
  "Development Status :: 5 - Production/Stable",
  "Environment :: Console",
  "Environment :: MacOS X",
  "Environment :: Plugins",
  "Intended Audience :: Developers",
  "Intended Audience :: Information Technology",
  "Intended Audience :: System Administrators",
  "Operating System :: MacOS :: MacOS X",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX :: BSD :: FreeBSD",
  "Operating System :: POSIX :: BSD :: NetBSD",
  "Operating System :: POSIX :: BSD :: OpenBSD",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Topic :: Security",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: System :: Archiving :: Packaging",
  "Topic :: System :: Installation/Setup",
  "Topic :: System :: Software Distribution",
  "Topic :: Utilities",
  "Typing :: Typed",
]
# Semantic versioning works in theory. In practice, it is hard to guarantee.
# That's why we rely on >= specifier instead of ~= to relax constraints. This gives more freedom to packagers to
# release hotfixes for security vulnerabilities in the future.
# See also discussion about upper limits at: https://iscinumpy.dev/post/bound-version-constraints/#tldr
# All minimal version choice are documented. Reasons to bump a minimal version are:
# - bug fixes,
# - security fixes,
# - new code path we depends on,
# - aligns minimal Python requirements to ours,
# - adds new explicit support Python version.
dependencies = [
  # Backports enum.StrEnum to Python < 3.11 (cli.SortableField, sbom.ExportFormat);
  # the class ships in every 1.x release.
  "backports-strenum>=1; python_version<'3.11'",
  # boltons 25.0.0 dropped Python 3.9, matching our requires-python >= 3.10.
  "boltons>=25",
  # click-extra 8.4.0 is the floor mpm targets, the first version shipping the
  # subprocess-execution primitives meta_package_manager.execution now delegates
  # to:
  #   - run_cli, the spawn/stream/timeout engine disclosing invocations at INFO
  #     and streaming their output live to DEBUG logs.
  #   - install_interrupt_handler / terminate_live_processes, the Ctrl+C child
  #     termination machinery (moved from mpm).
  #   - args_cleanup / format_cli_prompt / INDENT relocated from
  #     click_extra.testing to click_extra.execution.
  #   - The logging-to-spinner bridge that prints log records above a running
  #     spinner instead of garbling its frame.
  # The 8.3.0 series brought the `click:config` Sphinx directive rendering the
  # option reference in docs/configuration.md (via the [sphinx] extra of the
  # docs dependency group); 8.2.0 the resolve_jobs / run_jobs / run_lanes
  # concurrency primitives, the --export-config option, the
  # click_extra.sphinx.matrix machinery behind docs/install.md's compatibility
  # tables, and the `click:tree` / `python:render` directives behind
  # docs/cli-parameters.md and docs/benchmark.md. Earlier 8.x floors tracked
  # the split click_extra.highlight module, the ConfigValidator /
  # ValidationError import move to click_extra.config, print_table()'s
  # sort_key parameter, and the 8.1.1 fix for the EnumChoice-typed --sort-by
  # default; 8.4.0 covers them all.
  #
  # The `.dev0` suffix keeps the specifier satisfiable by the unreleased tree
  # the [tool.uv.sources] git override tracks; tighten to >=8.4 once 8.4.0 is
  # published and the override is dropped.
  "click-extra>=8.4.0.dev0",
  # extra-platforms 13.1.0 adds the ChromeOS, Clear Linux, SliTaz and Source Mage
  # detections that the chromebrew, swupd, tazpkg and sorcery managers declare.
  "extra-platforms>=13.1",
  # Required at runtime by meta_package_manager.package and
  # meta_package_manager.specifier (PackageURL, from_string(), to_string()) for
  # cross-manager package identification, independent of SBOM features. That API
  # has been stable since 0.11; the resolver selects a newer Python-compatible
  # release as needed.
  "packageurl-python>=0.11",
  # tomllib is stdlib from Python 3.11; on 3.10 we parse TOML via tomli.loads()
  # (cli.py), an API stable since 2.0. The marker keeps tomli off 3.11+.
  "tomli>=2; python_version<'3.11'",
  # config.py and cli.py serialize config and installed-package TOML via
  # tomli_w.dumps(), an API stable since 1.0.
  "tomli-w>=1",
  # xmltodict 0.12 stabilized the parse()/unparse() API we rely on in
  # managers/zypper.py. 1.0.0 was a stability bump with no functional change.
  # Keeping the floor low avoids forcing downstream packagers (Guix, Debian
  # stable) to ship a newer xmltodict than they otherwise need.
  "xmltodict>=0.12",
]
optional-dependencies.hjson = [ "click-extra[hjson]" ]
optional-dependencies.json5 = [ "click-extra[json5]" ]
optional-dependencies.jsonc = [ "click-extra[jsonc]" ]
# SBOM generation (`mpm sbom`) is split into two extras matching the two
# usage modes:
#
# - [sbom-offline]: pulls the CycloneDX and SPDX writer libraries so
#   `mpm sbom` can render documents from purely local data (manager
#   CLIs and on-disk metadata).  The cyclonedx [validation] extra is
#   intentionally omitted: schema validation runs in the test suite
#   (see tests/test_cli_sbom.py), which keeps jsonschema,
#   rfc3987-syntax, lark, and lxml out of the runtime install even with
#   `mpm[sbom-offline]`.  cyclonedx-python-lib 11.4.0 is the first to
#   expose the CycloneDX 1.7 schema (`JsonV1Dot7`, `SchemaVersion.V1_7`)
#   that `meta_package_manager.sbom.CycloneDX` targets, and is also new
#   enough to support Python 3.14; 11.9.0 introduced
#   `LicenseExpression.details` for per-identifier license-expression
#   metadata (`LicenseExpressionDetails`), which the renderer uses to
#   attach canonical SPDX URLs to each identifier inside a compound
#   expression.  spdx-tools 0.8.0 introduced the `spdx_tools` namespace
#   that meta_package_manager.sbom.spdx imports (model,
#   validation.document_validator, common.spdx_licensing, and the
#   json/rdf/tagvalue/xml/yaml writers); 0.8.2 is the floor we build
#   against.
#
# - [sbom-online]: adds httpx (the HTTP client used by
#   meta_package_manager.sbom._network) and platformdirs (used to
#   locate the on-disk response cache at the OS-appropriate location).
#   These power the opt-in `mpm --network sbom` mode that queries
#   OSV.dev for vulnerability data and attaches it to the rendered
#   document.  httpx 0.27 is the first release with the stable
#   `httpx.Timeout` constructor signature we rely on; platformdirs 4 is
#   the current major and matches what click-extra already ships
#   transitively.
optional-dependencies.sbom-offline = [ "cyclonedx-python-lib>=11.9", "spdx-tools>=0.8.2" ]
optional-dependencies.sbom-online = [ "httpx>=0.27", "platformdirs>=4" ]
# Package referenced above and also featured in [project.optional-dependencies] or [dependency-groups]
# will be set without version specifier as they are already constrained.
optional-dependencies.toml = [ "click-extra[toml]" ]
optional-dependencies.xml = [ "click-extra[xml]" ]
optional-dependencies.yaml = [ "click-extra[yaml]" ]
urls.Changelog = "https://github.com/kdeldycke/meta-package-manager/blob/main/changelog.md"
urls.Download = "https://github.com/kdeldycke/meta-package-manager/releases/tag/v7.3.0.dev0"
urls.Funding = "https://github.com/sponsors/kdeldycke"
urls.Homepage = "https://github.com/kdeldycke/meta-package-manager"
urls.Issues = "https://github.com/kdeldycke/meta-package-manager/issues"
urls.Repository = "https://github.com/kdeldycke/meta-package-manager"
# Alias for the main entry point. So we can call `uvx meta-package-manager` directly.
scripts.meta-package-manager = "meta_package_manager.__main__:main"
scripts.mpm = "meta_package_manager.__main__:main"

[dependency-groups]
test = [
  "click-extra[pytest]",
  "click-extra[toml]",
  # coverage 7.11.0 dropped Python 3.9, matching our requires-python >= 3.10.
  "coverage[toml]>=7.11",
  # The [validation] extra provides the jsonschema-based validators used to assert
  # generated CycloneDX SBOMs are schema-valid. Kept test-only (not a runtime dep) so
  # the heavy validation stack stays out of the install. See tests/test_cli_sbom.py.
  "cyclonedx-python-lib[validation]",
  "extra-platforms",
  # respx requires httpx as a peer; pin the same floor as [sbom-online].
  "httpx>=0.27",
  # pytest 9.0.0 reads native TOML config from the [tool.pytest] table used in this file.
  "pytest>=9",
  # pytest-cov 7.x is the release series wired to pytest 9's plugin interface.
  "pytest-cov>=7",
  # CI annotation plugin; auto-registers, so any recent release works.
  "pytest-github-actions-annotate-failures>=0.3",
  # pytest-randomly 4.x is the series compatible with pytest 9.
  "pytest-randomly>=4.0.1",
  # pytest-xdist 3.7 added the requires-python guard that keeps pre-3.14 releases
  # off Python 3.14; the [psutil] extra backs --numprocesses=auto.
  "pytest-xdist[psutil]>=3.7",
  # Imported by tests/test_docs.py to parse workflow YAML; 6.0 is the modern API.
  "pyyaml>=6",
  # respx mocks httpx calls in the sbom._network tests so the OSV adapter
  # test suite stays offline. Tied to httpx 0.27+ to match the [sbom-online]
  # floor; 0.22 is the first respx release supporting it.
  "respx>=0.22",
  # SPDX SBOM generation is now gated behind the [sbom-offline] extra (see
  # [project.optional-dependencies]); re-add spdx-tools and httpx at test
  # time so the SPDX-format and OSV-adapter tests in tests/test_cli_sbom.py
  # still import.
  "spdx-tools",
]
docs = [
  "click-extra[sphinx]",
  # furo 2025.9.25 is a recent CalVer release supporting Sphinx 8.
  "furo>=2025.9.25",
  # myst-parser 4.0 targets Sphinx 8 / Python 3.10+ and ships the attrs_block,
  # attrs_inline and colon_fence extensions enabled in docs/conf.py.
  "myst-parser>=4",
  # Sphinx 8.0.0 is the first version to drop Python 3.9, matching requires-python.
  "sphinx>=8",
  # sphinx-autodoc-typehints 2.4.0 is the first release aligned to Python >= 3.10.
  "sphinx-autodoc-typehints>=2.4",
  # sphinx-copybutton 0.5.2 stabilized the code-block copy button.
  "sphinx-copybutton>=0.5.2",
  # sphinx-datatables 1.0.0 is the first stable release; makes the binaries
  # catalog table searchable and sortable client-side (pulls sphinxcontrib-jquery).
  "sphinx-datatables>=1",
  # sphinx-design 0.6 introduced the card/grid/tab directive syntax used in docs.
  "sphinx-design>=0.6",
  # sphinxcontrib-mermaid 1.2.3 fixed mermaid_d3_zoom support, enabled in docs/conf.py.
  "sphinxcontrib-mermaid>=1.2.3",
  # sphinxext-opengraph 0.13 stabilized OpenGraph metadata generation for Sphinx 8+.
  "sphinxext-opengraph>=0.13",
  # tomlkit round-trips pyproject.toml edits (preserving comments and layout)
  # for the GitHub label sync in docs/docs_update.py.
  "tomlkit>=0.13",
]
typing = [
  # Stubs for the untyped runtime libraries mpm imports (boltons; PyYAML in
  # tests/test_docs.py; xmltodict in managers/zypper.py); stub versions track
  # their target library's API.
  "types-boltons>=25.0.0.20250919",
  "types-pyyaml>=6.0.12.9",
  "types-xmltodict>=1.0.1.20250920",
]

[tool.setuptools]
# Distributors like Guix that lack uv-build usually fall back to
# setuptools. Without explicit package discovery configuration, setuptools sees tests/, docs/, packaging/, and other
# top-level directories as packages and fails with "multiple top-level packages discovered" error. uv-build on the
# other hand ignores this section completely (it relies on [tool.uv].build-backend.module-root instead), so this is
# purely a compatibility shim for setuptools-based builds.
packages.find.include = [ "meta_package_manager*" ]

[tool.uv]
required-version = ">=0.11.23,<0.12"
# Cooldown period.
exclude-newer = "1 week"
# Per-package overrides for freshly-published dependencies we want to pull in
# before the global cooldown would normally let them through. Date format
# uses an ISO 8601 calendar date for ``exclude-newer-package`` entries.
exclude-newer-package = { click-extra = "2026-07-09T00:00:00Z" }
# Package is at root level, not in "./src/".
build-backend.module-root = ""

[tool.uv.sources]
# Track click-extra's main branch, which carries the unreleased subprocess-execution
# primitives mpm delegates to (run_cli, the Ctrl+C child termination machinery, the
# logging-to-spinner bridge). The lockfile pins the exact commit; refresh it with
# `uv lock --upgrade-package click-extra`. Switch to the sibling checkout instead
# ({ path = "../click-extra", editable = true }) to test its work-in-progress changes
# before they land, and drop this override entirely once click-extra 8.4.0 is
# published and the version floor is tightened to >=8.4.
click-extra = { git = "https://github.com/kdeldycke/click-extra", branch = "main" }

[tool.nuitka]
product-name = "Meta Package Manager"
file-description = "🎁 wraps all package managers with a unifying CLI"
copyright = "Kevin Deldycke <kevin@deldycke.com> and contributors. Distributed under GPL-2.0-or-later license."
file-version = "7.3.0"
product-version = "7.3.0"
# Each platform needs its native icon format (all rendered from icon.svg):
# .icns for macOS, .ico for Windows, .png for Linux. Passing a non-native
# image (like a PNG to --windows-icon-from-ico) makes Nuitka require the
# imageio package to convert it, which fails the build. Per-OS flags not
# matching the build host are ignored.
macos-app-icon = "docs/assets/icon.icns"
linux-icon = "docs/assets/icon.png"
windows-icon-from-ico = "docs/assets/icon.ico"
# Nuitka omits a package's own data files unless named here. The
# meta_package_manager.managers package carries yay_cooldown.lua, read at runtime
# via importlib.resources for the yay --cooldown overlay (see
# meta_package_manager.managers.pacman); without it the compiled binary would crash
# on import. The wheel (uv_build) includes the file with no extra config.
include-package-data = [ "click_extra", "meta_package_manager.managers:*.lua", "meta_package_manager.managers:*.toml" ]
# Packages whose imports are gated behind try/except in click-extra (config
# loader) and meta_package_manager.sbom: Nuitka skips these even when they
# are installed, so force-include them. Pairs with `[tool.repomatic]
# nuitka.extras` which syncs the corresponding mpm extras into the build
# venv. xmltodict is already an mpm runtime dep, so it does not need an
# entry here (Nuitka picks it up via the eager import in zypper.py).
include-package = [ "cyclonedx", "hjson", "json5", "jsonc", "spdx_tools", "yaml" ]

[tool.typos]
# Correct capitalization for proper nouns.
default.extend-identifiers = { Github = "GitHub", IOS = "iOS", Javascript = "JavaScript", MacOS = "macOS", PyPi = "PyPI", Typescript = "TypeScript" }
# Non-typo words flagged by default: `astroid` (the Python AST library) and
# `oject` (a "project" fragment surfaced when CLI-help output wraps a line).
default.extend-words = { astroid = "astroid", oject = "oject" }
# Skip content between <!-- typos:off --> and <!-- typos:on --> markers.
default.extend-ignore-re = [
  "(?s)<!-- typos:off -->.*?<!-- typos:on -->",
  # `{qeury}` is an intentional typo example: the definition schema rejects unknown
  # placeholders at load time, and docs/overrides.md, config.py and the
  # `typoed-placeholder` test case all demonstrate that rejection with it.
  "\\{qeury\\}",
  # Guix base32 source hashes are random strings; typos otherwise mangles embedded
  # letter runs (`adn` to `and`), corrupting the hash.
  'base32 "[0-9a-z]{52}"',
]
default.extend-ignore-identifiers-re = [
  # error: `buildd` should be `build`, `builds`
  #     ╭▸ ./claude.md:118
  #     │
  # 118 │ (..) inside a hermetic builder (Guix, Nixpkgs, Debian buildd, RPM mock, etc.).
  #     ╰╴                                                       ━━━━━━
  #
  # `buildd` is the proper name of Debian's autobuilder daemon.
  "buildd",
  # error: `certifi` should be `certify`, `certifies`, `certified`
  #   ╭▸ ./docs/assets/dependencies.mmd:7:5
  #   │
  # 7 │     certifi["certifi\n2025.11.12"]
  #   ╰╴    ━━━━━━━
  #
  "certifi",
  # error: `ist` should be `is`, `it`, `its`, `sit`, `list`
  #     ╭▸ ./claude.md
  #     │
  #     │ - [chalk.ist](https://chalk.ist)
  #     ╰╴         ━━━
  #
  "ist",
]

[tool.mypy]
explicit_package_bases = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
warn_unreachable = true
pretty = true
warn_unused_configs = true
# Sphinx >= 9.1 uses PEP 695 `type` statements, which mypy rejects under the
# project's --python-version 3.10 floor. tests/test_docs.py imports
# click_extra.sphinx.matrix (which imports sphinx), so skip following imports
# into sphinx instead of analyzing its 3.12+ source.
overrides = [
  { module = [ "packageurl.*" ], ignore_missing_imports = true },
  { module = [ "sphinx.*" ], follow_imports = "skip" },
]

[tool.pytest]
# https://docs.pytest.org/en/latest/customize.html#pyproject-toml
addopts = [
  "--durations=10",
  # XXX --run-non-destructiveis not required as this is the default behavior.
  # We would love to add it to the command line to make sure pytest is properly recognizing it and loads our
  # customization from ``./tests/conftest.py``. But because of issue
  # https://github.com/pytest-dev/pytest/issues/9311 (see above), it is not currently present in ``addopts``.
  # "--run-non-destructive",
]
# Make sure tests that are expected to fail do not resurect and start working all of a sudden.
xfail_strict = true

[tool.coverage]
# https://coverage.readthedocs.io/en/latest/config.html
run.branch = true
run.source = [ "meta_package_manager" ]
report.precision = 2

[tool.bumpversion]
current_version = "7.3.0.dev0"
# Parse versions with an optional .devN suffix (PEP 440).
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)(\\.dev(?P<dev>\\d+))?"
serialize = [
  "{major}.{minor}.{patch}.dev{dev}",
  "{major}.{minor}.{patch}",
]
ignore_missing_files = true
allow_dirty = true
parts.dev.optional_value = "release"
# When dev is "release" (its optional value), the .devN suffix is omitted.
# Bumping patch/minor/major resets dev to "0", producing X.Y.Z.dev0.
# Bumping dev goes from "0" to "release", stripping the suffix for release.
parts.dev.values = [ "0", "release" ]

[[tool.bumpversion.files]]
# Update Python package version in any __init__.py file.
glob = "./**/__init__.py"
ignore_missing_version = true

[[tool.bumpversion.files]]
# Update version in [project] section. Anchored to a line start (regex) so it
# does not also match version-suffixed keys like file-version/product-version
# under [tool.nuitka], which contain `version = "X"` as a substring (their
# values collide with the package version on release commits, where the .devN
# suffix is absent).
filename = "./pyproject.toml"
regex = true
search = '(?m)^version = "{current_version}"'
replace = 'version = "{new_version}"'

[[tool.bumpversion.files]]
# Update version in download URL.
filename = "./pyproject.toml"
search = "releases/tag/v{current_version}"
replace = "releases/tag/v{new_version}"

[[tool.bumpversion.files]]
# Keep the numeric file-version/product-version under [tool.nuitka] in sync,
# when present. Nuitka rejects PEP 440 .devN suffixes, so the file-specific
# serialize strips them; the `-version = "` prefix matches both keys at once.
# ignore_missing_version makes this a no-op in projects without [tool.nuitka].
filename = "./pyproject.toml"
ignore_missing_version = true
serialize = [ "{major}.{minor}.{patch}" ]
search = '-version = "{current_version}"'
replace = '-version = "{new_version}"'

[[tool.bumpversion.files]]
# Update the version in Markdown changelog.
filename = "./changelog.md"
search = "## [`{current_version}` (unreleased)]("
replace = "## [`{new_version}` (unreleased)]("

[[tool.bumpversion.files]]
# Update the version in the citation file.
filename = "./citation.cff"
search = "version: {current_version}"
replace = "version: {new_version}"

[[tool.bumpversion.files]]
# Update the release date in the citation file.
filename = "./citation.cff"
regex = true
search = "date-released: \\d{{4}}-\\d{{2}}-\\d{{2}}"
replace = "date-released: {utcnow:%Y-%m-%d}"

[tool.lychee]
# ref: https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml
exclude = [
  # GitHub renders issue comments with JavaScript, so the linkcheck builder cannot find them.
  "^https://github.com/.+#issuecomment-\\d+$",
  # GitHub renders commit-diff anchors client-side; the static HTML has no #diff-<hash> targets.
  "^https://github.com/.+/commit/[0-9a-f]+#diff-[0-9a-f]+$",
  # GitHub README tab fragments are rendered client-side.
  "^https://github\\.com/.+\\?tab=readme-ov-file#",
  # Skip suggesting redirecting generic download links to their binary artefact.
  "^https://github.com/.+/releases/.+/download/.*$",
  # Allow redirects of generic DOI URLs to their specific Zenodo release page.
  "^https://doi.org/.+/zenodo.*$",
  # Allow redirects to the official pip documentation.
  "^https://pip.pypa.io/.*$",
  # Sites that respond 403/418/timeout to lychee but are valid in a browser.
  "^https://claude\\.ai/.*$",
  "^https://devkitpro\\.org/?$",
  "^https://docs\\.chocolatey\\.org/.*$",
  "^https://en\\.opensuse\\.org/.*$",
  "^https://git\\.yoctoproject\\.org/.*$",
  "^https://gitlab\\.alpinelinux\\.org/.*$",
  "^https://gitlab\\.manjaro\\.org/.*$",
  "^https://liberapay\\.com/?$",
  "^https://medium\\.com/.*$",
  "^https://ohmybash\\.nntoan\\.com/?$",
  "^http://www\\.slackware\\.com/.*$",
  "^https://www\\.bitdefender\\.com/.*$",
  "^https://www\\.gnu\\.org/software/.*$",
  "^https://www\\.npmjs\\.com/?$",
  "^https://(www\\.)?patreon\\.com/?$",
  "^https://www\\.tug\\.org/.*$",
  # star-history.com renders chart fragments client-side; lychee can't see them.
  "^https://star-history\\.com/.*$",
  # openclipart.org intermittently returns 500 for valid asset detail pages.
  "^https://openclipart\\.org/.*$",
]

[tool.repomatic]
exclude = [ "labels", "skills" ]
# Source paths for workflow trigger filters.
workflow.source-paths = [ "meta_package_manager" ]
# Tests install system packages (apt, brew, etc.) and need a full runner image.
test-matrix.replace.os = { ubuntu-slim = "ubuntu-24.04" }
# lxml cannot compile on Windows ARM64.
# See: https://bugs.launchpad.net/lxml/+bug/2004481
test-matrix.remove.os = [ "windows-11-arm" ]
# Free-threaded 3.14t and prerelease 3.15 exercise interpreter-level
# compatibility, which is OS-independent: the shipped-config slice (3.10,
# 3.14) already covers every OS, so these two only need the single fastest
# runner (ubuntu-24.04-arm), not the full spread. 3.14t runs stable (3.14's
# free-threaded build is supported); 3.15 keeps repomatic's built-in
# prerelease `unstable` flag. Excludes name post-replace OS values, since
# replace runs before exclude. See repomatic's test-matrix guide.
test-matrix.exclude = [
  { os = "ubuntu-24.04", python-version = "3.14t" },
  { os = "macos-26", python-version = "3.14t" },
  { os = "macos-26-intel", python-version = "3.14t" },
  { os = "windows-2025", python-version = "3.14t" },
  { os = "ubuntu-24.04", python-version = "3.15" },
  { os = "macos-26", python-version = "3.15" },
  { os = "macos-26-intel", python-version = "3.15" },
  { os = "windows-2025", python-version = "3.15" },
]
# Sync optional-dependencies into the build venv so the Nuitka binary ships
# every feature gated behind try/except imports in click-extra and mpm:
#   - sbom-offline: cyclonedx-python-lib + spdx-tools, for `mpm sbom --spdx`
#                   and `mpm sbom --cyclonedx` rendering from local data.
#   - sbom-online: httpx + platformdirs, for the opt-in
#                  `mpm --network sbom` mode that queries OSV.dev for
#                  vulnerability data and caches responses on disk.
#   - toml/yaml/json5/jsonc/hjson/xml: click-extra config-file readers, for
#           `mpm --config <path>` and `mpm --table-format <fmt>` output.
# Paired with `include-package` in [tool.nuitka] below to defeat Nuitka's
# try/except import skip.
nuitka.extras = [ "hjson", "json5", "jsonc", "sbom-offline", "sbom-online", "toml", "xml", "yaml" ]
# Render the mpm Click command tree as roff `.1` files and attach them as
# `mpm-manpages.tar.gz` to every GitHub release (handled by the `manpages` job
# in repomatic's `_release-engine.yaml`). The `module:function` form bypasses
# the `mpm` console-script entry point, which dispatches through
# `__main__:main` and lazy-imports the Click command beyond click-extra's
# resolver reach.
manpages.script = "meta_package_manager.cli:mpm"
# Keep the asset short: defaults to `<package-name>-manpages.tar.gz` (i.e.
# `meta-package-manager-manpages.tar.gz`) when omitted; `mpm-manpages.tar.gz`
# matches the CLI name and shortens the asset URL on every release.
manpages.asset-name = "mpm-manpages"

