# Check some common packages are reported as installed in CSV format (Linux).
[[cases]]
cli_parameters = "--table-format csv installed"
only_platforms = "linux"
exit_code = 0
stdout_regex_matches = [
    "tzdata,,(apt|uv),\\S+\\n",
]

# Check some common packages are reported as installed in CSV format (macOS).
[[cases]]
cli_parameters = "--table-format csv installed"
only_platforms = "macos"
exit_code = 0
stdout_regex_matches = [
    "git,,brew,\\S+\\n",
]

# Check some common packages are reported as installed in CSV format (Windows).
# XXX We cannot rely on `chocolatey` self-listing via `choco list` on the
# windows-2025 runner: `choco` is detected as available (version check passes)
# but `choco list --limit-output` returns an empty package list, causing
# `choco: 0` in the pool summary with no error logged. Until that environment
# issue is diagnosed, match `click` instead: it is an mpm dependency and is
# guaranteed to be present in the workflow's `uv` environment.
[[cases]]
cli_parameters = "--table-format csv installed"
only_platforms = "windows"
exit_code = 0
stdout_regex_matches = [
    "click,,uv,\\S+\\n",
]

[[cases]]
cli_parameters = "managers"
skip_platforms = "windows"
exit_code = 0

[[cases]]
cli_parameters = "--all-managers managers"
skip_platforms = "windows"
exit_code = 0

[[cases]]
cli_parameters = "installed"
skip_platforms = "windows"
exit_code = 0

[[cases]]
cli_parameters = "outdated"
skip_platforms = "windows"
exit_code = 0

# XXX `which` prints a sorted table; on Windows the box-drawing and ✓ glyphs
# raise a cp1252 UnicodeEncodeError, so skip it there like the other table cases.
[[cases]]
cli_parameters = "which mpm"
skip_platforms = "windows"
exit_code = 0

[[cases]]
cli_parameters = "backup"
exit_code = 0

[[cases]]
cli_parameters = "sbom --spdx"
exit_code = 0

[[cases]]
cli_parameters = "sbom --cyclonedx"
exit_code = 0

# Config-format coverage. Each fixture is a minimal valid `[mpm]` config; the
# matching format reader is gated behind `try/except import <pkg>` in
# click-extra, so a failing case here means the [pkg]-named extra is missing
# from the binary (either not synced via [tool.repomatic] nuitka.extras or
# not bundled via [tool.nuitka] include-package).
[[cases]]
cli_parameters = "--validate-config tests/cli-test-plan-config.toml"
exit_code = 0
stderr_contains = "is valid."

[[cases]]
cli_parameters = "--validate-config tests/cli-test-plan-config.yaml"
exit_code = 0
stderr_contains = "is valid."

[[cases]]
cli_parameters = "--validate-config tests/cli-test-plan-config.json"
exit_code = 0
stderr_contains = "is valid."

[[cases]]
cli_parameters = "--validate-config tests/cli-test-plan-config.json5"
exit_code = 0
stderr_contains = "is valid."

[[cases]]
cli_parameters = "--validate-config tests/cli-test-plan-config.jsonc"
exit_code = 0
stderr_contains = "is valid."

[[cases]]
cli_parameters = "--validate-config tests/cli-test-plan-config.hjson"
exit_code = 0
stderr_contains = "is valid."

[[cases]]
cli_parameters = "--validate-config tests/cli-test-plan-config.xml"
exit_code = 0
stderr_contains = "is valid."

# Table-format breadth. Each format is a separate tabulate renderer (toml,
# yaml, json, xml). A regression here flags a missing tabulate/format
# package data file in the bundled binary.
[[cases]]
cli_parameters = "--table-format json managers"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "\"id\": \"cargo\""

[[cases]]
cli_parameters = "--table-format yaml managers"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "id: cargo"

[[cases]]
cli_parameters = "--table-format toml managers"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "id = \"cargo\""

[[cases]]
cli_parameters = "--table-format xml managers"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "<cargo>"

# Globals introduced this cycle. `--man` exercises the roff renderer click-extra
# 7.19 ships and its embedded data files; `--summary` replaces the old
# `--stats`; `--accessible` swaps to the plain renderer; `--cooldown DURATION`
# parses a duration string. The introspection flags `--show-params` and
# `--man` print and exit 0 without contacting any package manager.
[[cases]]
cli_parameters = "--man"
exit_code = 0
stdout_contains = ".TH \"MPM\""

[[cases]]
cli_parameters = "--show-params"
skip_platforms = "windows"
exit_code = 0
strip_ansi = true
stdout_contains = "mpm.accessible"

[[cases]]
cli_parameters = "--accessible managers"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "cargo"

[[cases]]
cli_parameters = "--summary managers"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "cargo"

[[cases]]
cli_parameters = "--cooldown 30days managers"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "cargo"

# Subcommands not exercised by the other tests. `config-template` prints a
# per-manager TOML overrides skeleton, `help` dispatches click-extra's
# command-help renderer, `search` exercises the search highlighting path
# (click-extra theme).
[[cases]]
cli_parameters = "config-template"
exit_code = 0
stdout_contains = "[mpm.managers.apk]"

[[cases]]
cli_parameters = "help managers"
exit_code = 0
strip_ansi = true
stdout_contains = "Usage: mpm managers"

[[cases]]
cli_parameters = "search click"
skip_platforms = "windows"
exit_code = 0

# Negative cases: click-extra must surface usage errors with exit code 2 and
# a "No such" message, not a Python traceback (which the onefile binary has
# been known to print when an unexpected exception escapes click).
[[cases]]
cli_parameters = "bogus-subcommand"
exit_code = 2
stderr_contains = "No such command 'bogus-subcommand'"

[[cases]]
cli_parameters = "--bogus-flag"
exit_code = 2
stderr_contains = "No such option '--bogus-flag'"

# Every command and subcommand must render its --help screen without crashing,
# including in the compiled binaries where a missing data file or lazy import
# only surfaces at runtime. One case per command path, in the CLI's own sorted
# order; the root --help is covered by its dedicated case above.
# tests/test_help.py keeps this roster in sync with the live command tree.

[[cases]]
cli_parameters = "cleanup --help"
exit_code = 0
strip_ansi = true
