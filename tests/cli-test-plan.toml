# This test plan checks some high-level behavior of the mpm CLI.

# Runs the same binary tests as in the brew official Formula:
# https://github.com/Homebrew/homebrew-core/blob/f0a4d69/Formula/meta-package-manager.rb#L401-L413

# Check mpm is reporting the correct version of itself.
# click_extra 7.19+ renders the program name with both bright (97m) and bold (1m)
# codes. The bold code is optional to stay compatible with older click_extra
# releases that only emit the bright code.
# `--color` forces ANSI: the test harness captures stdout (no TTY), so without it
# the binary emits a plain, uncolored string and these assertions fail on every
# platform. XXX Skipped on Windows even so: colorama rewrites ANSI into Win32
# console calls, so the forced escape codes never reach stdout there.
[[cases]]
cli_parameters = "--color --version"
skip_platforms = "windows"
exit_code = 0
stdout_contains = "mpm\u001b[0m, version \u001b[32m"
stdout_regex_fullmatch = "\\x1b\\[97m(\\x1b\\[1m)?mpm\\x1b\\[0m, version \\x1b\\[32m[0-9]+\\.[0-9]+\\.[0-9]+(\\.[a-z]+[0-9]+(\\+[a-f0-9]+)?)?\\x1b\\[0m\\n(\\x1b\\[90mPython [^\\n]+\\x1b\\[0m\\n)?"

# Check mpm is reporting its usage in help screen.
[[cases]]
cli_parameters = "--help"
exit_code = 0
strip_ansi = true
stdout_contains = [
    "Usage: mpm [OPTIONS] COMMAND [ARGS]...",
    "-h, --help",
]

